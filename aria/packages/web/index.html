<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f4ed">
<title>ARIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --parchment:   #f5f4ed;
  --ivory:       #faf9f5;
  --warm-sand:   #e8e6dc;
  --near-black:  #141413;
  --dark-surface:#30302e;
  --tx:          #141413;
  --tx-olive:    #5e5d59;
  --tx-stone:    #87867f;
  --tx-charcoal: #4d4c48;
  --terracotta:  #c96442;
  --coral:       #d97757;
  --border-cream:#f0eee6;
  --border-warm: #e8e6dc;
  --ring-warm:   #d1cfc5;
  --ring-deep:   #c2c0b6;
  --focus-blue:  #3898ec;
  --online:      #3d9e6e;
  --serif: 'Lora', Georgia, serif;
  --sans:  'Inter', system-ui, -apple-system, sans-serif;
  --mono:  'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}

html, body {
  height: 100%;
  background: var(--parchment);
  color: var(--tx);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  height: 100vh;
}

header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  height: 56px;
  padding-top: env(safe-area-inset-top);
  background: var(--ivory);
  border-bottom: 1px solid var(--border-cream);
}
.h-brand { display: flex; align-items: center; gap: 11px; }
.logo {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--terracotta);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 0 1px var(--terracotta);
}
.logo-letter {
  font-family: var(--serif); font-size: 16px; font-weight: 500;
  color: var(--ivory); line-height: 1; margin-top: 1px;
}
.h-name {
  font-family: var(--serif); font-size: 18px; font-weight: 500;
  color: var(--tx); letter-spacing: -0.2px; line-height: 1;
}
.h-status {
  display: flex; align-items: center; gap: 7px;
  font-family: var(--sans); font-size: 12px; color: var(--tx-stone);
}
.h-pip {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--online); flex-shrink: 0;
}
.h-pip.thinking {
  background: var(--terracotta);
  animation: pip-blink 0.85s ease-in-out infinite;
}
@keyframes pip-blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.h-btn {
  height: 30px; padding: 0 12px; border-radius: 8px; border: none;
  background: var(--warm-sand); color: var(--tx-charcoal);
  font-family: var(--sans); font-size: 12px; font-weight: 500;
  cursor: pointer; box-shadow: 0 0 0 1px var(--ring-warm);
  transition: box-shadow .15s, background .15s;
}
.h-btn:hover { background: var(--border-warm); box-shadow: 0 0 0 1px var(--ring-deep); }

#messages {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  scroll-behavior: smooth; background: var(--parchment);
}
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: var(--ring-warm); border-radius: 2px; }

.feed { max-width: 700px; margin: 0 auto; padding: 0 28px 24px; }

.welcome {
  padding: 52px 0 40px; display: flex; flex-direction: column;
  align-items: flex-start; gap: 14px;
}
.welcome-title {
  font-family: var(--serif); font-size: 32px; font-weight: 500;
  color: var(--tx); line-height: 1.2; letter-spacing: -0.3px;
}
.welcome-sub {
  font-family: var(--sans); font-size: 16px; color: var(--tx-olive);
  line-height: 1.6; max-width: 440px;
}
.starters { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
.starter {
  padding: 8px 16px; border-radius: 20px; border: none;
  background: var(--ivory); box-shadow: 0 0 0 1px var(--border-warm);
  color: var(--tx-olive); font-family: var(--sans); font-size: 14px;
  cursor: pointer; text-align: left;
  transition: box-shadow .15s, color .15s, background .15s;
}
.starter:hover { box-shadow: 0 0 0 1px var(--ring-warm); background: var(--warm-sand); color: var(--tx); }

.date-sep {
  display: flex; align-items: center; gap: 14px;
  padding: 28px 0 20px; color: var(--tx-stone);
  font-family: var(--sans); font-size: 10px;
  letter-spacing: 0.5px; text-transform: uppercase;
}
.date-sep::before, .date-sep::after {
  content: ''; flex: 1; height: 1px; background: var(--border-cream);
}

.msg { padding: 16px 0; animation: msg-in .2s ease both; }
.msg + .msg { border-top: 1px solid var(--border-cream); }
@keyframes msg-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.msg.aria-msg { display: flex; align-items: flex-start; gap: 14px; }
.aria-av {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--terracotta); display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; margin-top: 1px;
  box-shadow: 0 0 0 1px var(--terracotta);
}
.aria-av-letter { font-family: var(--serif); font-size: 13px; font-weight: 500; color: var(--ivory); line-height: 1; }
.aria-content { flex: 1; min-width: 0; }
.aria-label {
  font-family: var(--sans); font-size: 10px; font-weight: 500;
  letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--tx-stone); margin-bottom: 6px;
}

.prose {
  font-family: var(--serif); font-size: 16px; font-weight: 400;
  line-height: 1.75; color: var(--tx); word-break: break-word;
}
.prose p { margin: 0 0 12px; }
.prose p:last-child { margin-bottom: 0; }
.prose strong { font-weight: 600; color: var(--tx); font-family: var(--sans); }
.prose em { font-style: italic; color: var(--tx-olive); }
.prose h1,.prose h2,.prose h3 {
  font-family: var(--serif); font-weight: 500; line-height: 1.3;
  color: var(--tx); margin: 20px 0 8px;
}
.prose h1 { font-size: 22px; } .prose h2 { font-size: 19px; } .prose h3 { font-size: 17px; }
.prose h1:first-child,.prose h2:first-child,.prose h3:first-child { margin-top: 0; }
.prose ul,.prose ol { padding-left: 22px; margin: 8px 0 12px; }
.prose li { margin: 7px 0; line-height: 1.7; }
.prose li::marker { color: var(--terracotta); }
.prose code {
  font-family: var(--mono); font-size: 13.5px;
  background: var(--warm-sand); border: 1px solid var(--border-warm);
  border-radius: 5px; padding: 1px 6px; color: var(--dark-surface);
}
.prose pre {
  background: var(--near-black); border-radius: 10px;
  padding: 16px 18px; overflow-x: auto; margin: 14px 0;
  box-shadow: 0 0 0 1px var(--dark-surface);
}
.prose pre code { background: none; border: none; padding: 0; color: #e8d5c4; font-size: 13.5px; line-height: 1.65; }
.prose blockquote { border-left: 3px solid var(--terracotta); padding-left: 16px; margin: 14px 0; color: var(--tx-olive); font-style: italic; }
.prose hr { border: none; border-top: 1px solid var(--border-warm); margin: 18px 0; }
.prose a { color: var(--terracotta); text-decoration: underline; text-underline-offset: 3px; }
.prose table { border-collapse: collapse; width: 100%; margin: 14px 0; font-family: var(--sans); font-size: 14px; }
.prose th { background: var(--warm-sand); padding: 8px 14px; text-align: left; font-weight: 600; font-size: 11px; letter-spacing: 0.4px; text-transform: uppercase; color: var(--tx-charcoal); border-bottom: 1px solid var(--border-warm); }
.prose td { padding: 9px 14px; border-bottom: 1px solid var(--border-cream); color: var(--tx-olive); }

.type-cursor {
  display: inline-block; width: 2px; height: 1em;
  background: var(--terracotta); border-radius: 1px;
  margin-left: 2px; vertical-align: text-bottom;
  animation: cur-blink .9s step-end infinite;
}
@keyframes cur-blink { 0%,100%{opacity:1} 50%{opacity:0} }

.thinking { display: flex; align-items: center; gap: 5px; padding: 4px 0; }
.thinking-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--ring-warm);
  animation: dot-rise 1.3s ease-in-out infinite;
}
.thinking-dot:nth-child(2){animation-delay:.15s} .thinking-dot:nth-child(3){animation-delay:.3s}
@keyframes dot-rise { 0%,60%,100%{opacity:.3;transform:translateY(0)} 30%{opacity:1;transform:translateY(-4px)} }

.msg.user-msg { display: flex; justify-content: flex-end; }
.user-bubble {
  max-width: min(72%, 500px);
  background: var(--warm-sand); border-radius: 18px 18px 4px 18px;
  padding: 13px 18px; box-shadow: 0 0 0 1px var(--ring-warm);
  font-family: var(--sans); font-size: 15px; line-height: 1.65;
  color: var(--tx); word-break: break-word;
}

#input-area {
  flex-shrink: 0;
  padding: 16px 28px;
  padding-bottom: max(20px, env(safe-area-inset-bottom));
  background: var(--ivory);
  border-top: 1px solid var(--border-cream);
}
.input-wrap { max-width: 700px; margin: 0 auto; }
.input-shell {
  display: flex; align-items: flex-end; gap: 10px;
  background: var(--parchment); border-radius: 14px;
  padding: 12px 12px 12px 18px;
  box-shadow: 0 0 0 1.5px var(--border-warm);
  transition: box-shadow .2s;
}
.input-shell:focus-within { box-shadow: 0 0 0 2px var(--focus-blue); }
textarea#inp {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--tx); font-family: var(--sans); font-size: 15px;
  line-height: 1.55; resize: none; min-height: 24px; max-height: 160px;
  overflow-y: auto; caret-color: var(--terracotta);
}
textarea#inp::placeholder { color: var(--tx-stone); }
#send-btn {
  width: 36px; height: 36px; border-radius: 9px; border: none;
  background: var(--terracotta); color: var(--ivory); cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  box-shadow: 0 0 0 1px var(--terracotta);
  transition: background .15s, box-shadow .15s, transform .1s;
}
#send-btn:hover { background: var(--coral); box-shadow: 0 0 0 1px var(--coral); }
#send-btn:active { transform: scale(.93); }
#send-btn:disabled {
  background: var(--warm-sand); box-shadow: 0 0 0 1px var(--ring-warm);
  color: var(--tx-stone); cursor: not-allowed; transform: none;
}
.input-hint {
  margin-top: 9px; text-align: center;
  font-family: var(--sans); font-size: 11px; color: var(--tx-stone);
}

#attach-btn {
  width: 32px; height: 32px; border-radius: 8px; border: none;
  background: transparent; color: var(--tx-stone); cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: color .15s, background .15s;
}
#attach-btn:hover { color: var(--tx); background: var(--warm-sand); }

#attach-chips {
  display: flex; flex-wrap: wrap; gap: 6px;
  max-width: 700px; margin: 0 auto;
  padding-bottom: 6px;
}
#attach-chips:empty { display: none; }

.attach-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 20px;
  background: var(--warm-sand); box-shadow: 0 0 0 1px var(--ring-warm);
  font-family: var(--sans); font-size: 12px; color: var(--tx-charcoal);
  max-width: 200px;
}
.attach-chip-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.attach-chip-remove {
  flex-shrink: 0; width: 14px; height: 14px; border-radius: 50%; border: none;
  background: var(--tx-stone); color: var(--ivory);
  font-size: 9px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.attach-chip-remove:hover { background: var(--terracotta); }

@media (max-width: 600px) {
  header { padding: 0 16px; }
  .feed { padding: 0 16px 20px; }
  #input-area { padding: 12px 16px; padding-bottom: max(20px, env(safe-area-inset-bottom)); }
  .welcome-title { font-size: 26px; }
  .user-bubble { max-width: 88%; }
}
@media (min-width: 900px) {
  .feed { padding: 0 48px 24px; }
  #input-area { padding: 18px 48px; padding-bottom: 24px; }
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="h-brand">
      <div class="logo"><span class="logo-letter">A</span></div>
      <span class="h-name">ARIA</span>
    </div>
    <div class="h-status">
      <div class="h-pip" id="pip"></div>
      <span id="status-txt">Ready</span>
    </div>
    <button class="h-btn" onclick="clearChat()">Clear</button>
  </header>

  <div id="messages">
    <div class="feed" id="feed">
      <div id="welcome" class="welcome">
        <div class="welcome-title">How can I help you today?</div>
        <div class="welcome-sub">I can help you plan tasks, track projects, follow up on work, and keep your week on track.</div>
        <div class="starters">
          <button class="starter" onclick="prefill(this)">📋 What's on my plate today?</button>
          <button class="starter" onclick="prefill(this)">🚀 Create a new project</button>
          <button class="starter" onclick="prefill(this)">⏰ What tasks are overdue?</button>
          <button class="starter" onclick="prefill(this)">📊 Summarize my week</button>
        </div>
      </div>
      <div id="msg-list"></div>
    </div>
  </div>

  <div id="input-area">
    <div class="input-wrap">
      <div id="attach-chips"></div>
      <div class="input-shell">
        <input type="file" id="file-input" multiple style="display:none">
        <button id="attach-btn" type="button" title="Attach file">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <textarea id="inp" rows="1" placeholder="Ask ARIA to plan, track, or follow up…" autocomplete="off" spellcheck="true"></textarea>
        <button id="send-btn" disabled>
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 13V3M3 8l5-5 5 5"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter to send · Shift + Enter for new line</div>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';
  const API='http://188.245.242.236:4000', UID='user-1', CHAR_MS=12;
  const $msgs=document.getElementById('messages'),
        $list=document.getElementById('msg-list'),
        $welcome=document.getElementById('welcome'),
        $inp=document.getElementById('inp'),
        $btn=document.getElementById('send-btn'),
        $pip=document.getElementById('pip'),
        $stxt=document.getElementById('status-txt'),
        $fileInput=document.getElementById('file-input'),
        $attachBtn=document.getElementById('attach-btn'),
        $chips=document.getElementById('attach-chips');

  marked.setOptions({breaks:true,gfm:true});
  let busy=false, started=false;

  // ── Attachment state ──────────────────────────────────────────────────────
  let attachments=[];   // [{name, type, dataUrl}]

  $attachBtn.addEventListener('click',()=>$fileInput.click());

  $fileInput.addEventListener('change',()=>{
    const files=Array.from($fileInput.files||[]);
    if(!files.length)return;
    files.forEach(file=>{
      if(attachments.find(a=>a.name===file.name))return;
      const reader=new FileReader();
      reader.onload=function(ev){
        attachments.push({name:file.name,type:file.type,dataUrl:ev.target.result});
        renderChips();
        updateSendBtn();
      };
      reader.readAsDataURL(file);
    });
    $fileInput.value='';
  });

  function renderChips(){
    $chips.innerHTML='';
    attachments.forEach((a,i)=>{
      const chip=document.createElement('div'); chip.className='attach-chip';
      const name=document.createElement('span'); name.className='attach-chip-name'; name.textContent=a.name;
      const rm=document.createElement('button'); rm.className='attach-chip-remove'; rm.type='button'; rm.textContent='×';
      rm.addEventListener('click',()=>{attachments.splice(i,1); renderChips(); updateSendBtn();});
      chip.appendChild(name); chip.appendChild(rm);
      $chips.appendChild(chip);
    });
  }

  // ── Input helpers ─────────────────────────────────────────────────────────
  function updateSendBtn(){
    $btn.disabled=(!$inp.value.trim()&&attachments.length===0)||busy;
  }

  $inp.addEventListener('input',()=>{
    $inp.style.height='auto';
    $inp.style.height=Math.min($inp.scrollHeight,160)+'px';
    updateSendBtn();
  });
  $inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!$btn.disabled)submit();}
  });
  $btn.addEventListener('click',submit);

  window.prefill=function(btn){
    const text=btn.textContent.replace(/^[\p{Emoji_Presentation}\p{Extended_Pictographic}\s]+/u,'').trim();
    $inp.value=text; $inp.dispatchEvent(new Event('input')); $inp.focus();
  };

  // ── Message rendering ─────────────────────────────────────────────────────
  function addUser(text,files){
    ensureStarted();
    const d=document.createElement('div'); d.className='msg user-msg';
    const wrap=document.createElement('div'); wrap.style.cssText='display:flex;flex-direction:column;align-items:flex-end;gap:6px;';
    if(files&&files.length){
      files.forEach(f=>{
        if(f.type.startsWith('image/')){
          const img=document.createElement('img');
          img.src=f.dataUrl; img.alt=f.name;
          img.style.cssText='max-width:260px;max-height:180px;border-radius:10px;display:block;';
          wrap.appendChild(img);
        }else{
          const chip=document.createElement('div'); chip.className='attach-chip';
          chip.style.maxWidth='none'; chip.textContent=f.name;
          wrap.appendChild(chip);
        }
      });
    }
    if(text){const b=document.createElement('div'); b.className='user-bubble'; b.textContent=text; wrap.appendChild(b);}
    d.appendChild(wrap); $list.appendChild(d); scroll();
  }

  function addAria(){
    ensureStarted();
    const d=document.createElement('div'); d.className='msg aria-msg';
    d.innerHTML='<div class="aria-av"><span class="aria-av-letter">A</span></div><div class="aria-content"><div class="aria-label">ARIA</div><div class="aria-body"></div></div>';
    $list.appendChild(d); scroll();
    return d.querySelector('.aria-body');
  }

  function showThinking(body){
    body.innerHTML='<div class="thinking"><div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div></div>';
    scroll();
  }

  async function typeReply(body,text){
    body.innerHTML='';
    const c=document.createElement('div'); c.className='prose'; body.appendChild(c);
    const cur=document.createElement('span'); cur.className='type-cursor';
    for(const ch of text){
      cur.remove();
      c.appendChild(ch==='\n'?document.createElement('br'):document.createTextNode(ch));
      c.appendChild(cur); scroll();
      await sleep(CHAR_MS);
    }
    cur.remove();
    c.innerHTML=marked.parse(text);
    scroll();
  }

  // ── Submit ────────────────────────────────────────────────────────────────
  async function submit(){
    const text=$inp.value.trim();
    if((!text&&attachments.length===0)||busy)return;

    busy=true; $btn.disabled=true;
    $inp.value=''; $inp.style.height='auto';

    const sentFiles=attachments.slice();
    attachments=[]; renderChips();

    addUser(text,sentFiles);
    const body=addAria(); showThinking(body); setStatus(true);
    try{
      const payload={userId:UID,message:text};
      if(sentFiles.length) payload.attachments=sentFiles.map(f=>({name:f.name,type:f.type,dataUrl:f.dataUrl}));
      const r=await fetch(`${API}/api/aria/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      if(!r.ok)throw new Error('HTTP '+r.status);
      const{reply}=await r.json();
      await typeReply(body,reply||"I've noted that down.");
    }catch(e){
      await typeReply(body,`_Could not reach ARIA — ${e.message}_`);
    }finally{
      busy=false; updateSendBtn(); setStatus(false); $inp.focus();
    }
  }

  function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
  function scroll(){requestAnimationFrame(()=>{$msgs.scrollTop=$msgs.scrollHeight;});}
  function setStatus(on){
    $pip.className=on?'h-pip thinking':'h-pip';
    $stxt.textContent=on?'Thinking…':'Ready';
  }
  function ensureStarted(){
    if(started)return; started=true;
    $welcome.style.display='none';
    const sep=document.createElement('div'); sep.className='date-sep';
    sep.textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    $list.insertAdjacentElement('beforebegin',sep);
  }
  window.clearChat=function(){
    started=false; $list.innerHTML='';
    attachments=[]; renderChips();
    document.querySelectorAll('.date-sep').forEach(el=>el.remove());
    $welcome.style.display='';
  };

  // Subscribe to server-sent proactive events (reminders, briefings, nudges)
  (function connectSSE(){
    const es=new EventSource(`${API}/api/aria/events?userId=${UID}`);
    es.onmessage=function(e){
      try{
        const data=JSON.parse(e.data);
        if(data.content){const body=addAria();body.innerHTML='<div class="prose">'+marked.parse(data.content)+'</div>';}
      }catch(_){}
    };
    es.onerror=function(){
      es.close();
      setTimeout(connectSSE,5000);
    };
  })();

  setTimeout(()=>$inp.focus(),150);
})();
</script>
