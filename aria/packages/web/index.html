<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F5F4EF">
<title>ARIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #F5F4EF;
  --surface:     #FAFAF7;
  --pill-bg:     #EDECE6;
  --pill-hover:  #E2E1DA;
  --tx:          #1C1B18;
  --tx-muted:    #68675F;
  --tx-faint:    #9B9A94;
  --accent:      #9580FF;
  --border:      #E5E4DC;
  --border-input:#D8D7CF;
  --online:      #52C98E;
  --sans: 'Inter', system-ui, -apple-system, sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--tx);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  height: 100vh;
}

/* ── Header ── */
header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  height: 52px;
  padding-top: env(safe-area-inset-top);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.h-left {
  display: flex;
  align-items: center;
  gap: 9px;
}

.h-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--tx);
  letter-spacing: -0.2px;
}

.h-pip {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--online);
  flex-shrink: 0;
}
.h-pip.thinking {
  background: var(--accent);
  animation: pip-blink 0.85s ease-in-out infinite;
}
@keyframes pip-blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

.h-icon-btn {
  width: 34px;
  height: 34px;
  border-radius: 10px;
  border: none;
  background: var(--pill-bg);
  color: var(--accent);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s;
}
.h-icon-btn:hover { background: var(--pill-hover); }

/* ── Landing screen (NOT inside #messages — prevents flicker bug) ── */
#landing {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px 24px;
  overflow: hidden;
}
#landing.hidden { display: none; }

.landing-inner {
  text-align: center;
  max-width: 500px;
  width: 100%;
}

.landing-title {
  font-size: 36px;
  font-weight: 600;
  color: var(--tx);
  letter-spacing: -0.5px;
  line-height: 1.1;
  margin-bottom: 14px;
}

.landing-sub {
  font-size: 15px;
  color: var(--tx-muted);
  line-height: 1.65;
  max-width: 400px;
  margin: 0 auto 32px;
}

.quick-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

.qa-btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 18px;
  border-radius: 100px;
  border: none;
  background: var(--pill-bg);
  color: var(--tx-muted);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: background .15s, color .15s;
  white-space: nowrap;
}
.qa-btn:hover { background: var(--pill-hover); color: var(--tx); }
.qa-btn svg { flex-shrink: 0; opacity: 0.65; }

/* ── Messages (hidden until first send — fixes disappearing message bug) ── */
#messages {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  scroll-behavior: smooth;
  background: var(--bg);
  display: none;
}
#messages.visible { display: block; }
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.feed {
  max-width: 720px;
  margin: 0 auto;
  padding: 24px 28px 20px;
}

.date-sep {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 20px 0 16px;
  color: var(--tx-faint);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.4px;
  text-transform: uppercase;
}
.date-sep::before, .date-sep::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.msg { padding: 16px 0; animation: msg-in .18s ease both; }
.msg + .msg { border-top: 1px solid var(--border); }
@keyframes msg-in { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

.msg.aria-msg { display: flex; align-items: flex-start; gap: 12px; }
.aria-av {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
  opacity: 0.9;
}
.aria-av-letter {
  font-size: 12px;
  font-weight: 600;
  color: #fff;
  line-height: 1;
}
.aria-content { flex: 1; min-width: 0; }
.aria-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  color: var(--tx-faint);
  margin-bottom: 5px;
}

.prose {
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.75;
  color: var(--tx);
  word-break: break-word;
}
.prose p { margin: 0 0 10px; }
.prose p:last-child { margin-bottom: 0; }
.prose strong { font-weight: 600; color: var(--tx); }
.prose em { font-style: italic; color: var(--tx-muted); }
.prose h1,.prose h2,.prose h3 {
  font-weight: 600;
  line-height: 1.3;
  color: var(--tx);
  margin: 18px 0 8px;
}
.prose h1 { font-size: 20px; }
.prose h2 { font-size: 17px; }
.prose h3 { font-size: 15px; }
.prose h1:first-child,.prose h2:first-child,.prose h3:first-child { margin-top: 0; }
.prose ul,.prose ol { padding-left: 20px; margin: 8px 0 10px; }
.prose li { margin: 5px 0; line-height: 1.7; }
.prose li::marker { color: var(--accent); }
.prose code {
  font-family: var(--mono);
  font-size: 13px;
  background: var(--pill-bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 1px 6px;
  color: var(--tx);
}
.prose pre {
  background: #1E1E1E;
  border-radius: 10px;
  padding: 14px 16px;
  overflow-x: auto;
  margin: 12px 0;
}
.prose pre code { background: none; border: none; padding: 0; color: #E8D5C4; font-size: 13px; line-height: 1.65; }
.prose blockquote { border-left: 3px solid var(--accent); padding-left: 14px; margin: 12px 0; color: var(--tx-muted); font-style: italic; }
.prose hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.prose a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
.prose table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 14px; }
.prose th { background: var(--pill-bg); padding: 7px 12px; text-align: left; font-weight: 600; font-size: 11px; letter-spacing: 0.4px; text-transform: uppercase; color: var(--tx-muted); border-bottom: 1px solid var(--border); }
.prose td { padding: 8px 12px; border-bottom: 1px solid var(--border); color: var(--tx-muted); }

.type-cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--accent);
  border-radius: 1px;
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: cur-blink .9s step-end infinite;
}
@keyframes cur-blink { 0%,100%{opacity:1} 50%{opacity:0} }

.thinking { display: flex; align-items: center; gap: 5px; padding: 3px 0; }
.thinking-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--border-input);
  animation: dot-rise 1.3s ease-in-out infinite;
}
.thinking-dot:nth-child(2){animation-delay:.15s}
.thinking-dot:nth-child(3){animation-delay:.3s}
@keyframes dot-rise { 0%,60%,100%{opacity:.3;transform:translateY(0)} 30%{opacity:1;transform:translateY(-4px)} }

.msg.user-msg { display: flex; justify-content: flex-end; }
.user-bubble {
  max-width: min(72%, 520px);
  background: var(--pill-bg);
  border-radius: 18px 18px 4px 18px;
  padding: 11px 16px;
  border: 1px solid var(--border);
  font-size: 15px;
  line-height: 1.65;
  color: var(--tx);
  word-break: break-word;
}

/* ── Input ── */
#input-area {
  flex-shrink: 0;
  padding: 14px 24px;
  padding-bottom: max(20px, env(safe-area-inset-bottom));
  background: var(--surface);
  border-top: 1px solid var(--border);
}
.input-wrap { max-width: 720px; margin: 0 auto; }
.input-shell {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: var(--bg);
  border-radius: 16px;
  padding: 10px 10px 10px 18px;
  border: 1.5px solid var(--border-input);
  transition: border-color .2s;
}
.input-shell:focus-within { border-color: var(--accent); }
textarea#inp {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--tx);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.55;
  resize: none;
  min-height: 24px;
  max-height: 160px;
  overflow-y: auto;
  caret-color: var(--accent);
}
textarea#inp::placeholder { color: var(--tx-faint); }
#send-btn {
  width: 34px;
  height: 34px;
  border-radius: 10px;
  border: none;
  background: var(--tx);
  color: var(--bg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity .15s, transform .1s;
}
#send-btn:hover:not(:disabled) { opacity: 0.8; }
#send-btn:active:not(:disabled) { transform: scale(.93); }
#send-btn:disabled {
  background: var(--pill-bg);
  color: var(--tx-faint);
  cursor: not-allowed;
}

@media (max-width: 600px) {
  header { padding: 0 16px; }
  .feed { padding: 20px 16px 16px; }
  #input-area { padding: 10px 16px; padding-bottom: max(18px, env(safe-area-inset-bottom)); }
  .landing-title { font-size: 30px; }
  .user-bubble { max-width: 88%; }
}
@media (min-width: 900px) {
  .feed { padding: 28px 48px 20px; }
  #input-area { padding: 16px 48px; padding-bottom: 20px; }
}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="h-left">
      <span class="h-name">ARIA</span>
      <div class="h-pip" id="pip"></div>
    </div>
    <button class="h-icon-btn" id="clear-btn" title="New conversation">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round">
        <path d="M8 1.5L13.5 4.75V11.25L8 14.5L2.5 11.25V4.75L8 1.5Z"/>
      </svg>
    </button>
  </header>

  <!-- Landing — completely separate from #messages; no DOM entanglement -->
  <div id="landing">
    <div class="landing-inner">
      <div class="landing-title">ARIA</div>
      <div class="landing-sub">How can I help you today? Type /help to see all commands, or pick a quick action below.</div>
      <div class="quick-actions">
        <button class="qa-btn" onclick="quickAction(this)" data-prompt="Analyze this for me: ">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="7" cy="7" r="5"/><path d="M10.5 10.5L14 14"/>
            <path d="M7 4.5V7l1.5 1.5"/>
          </svg>
          Analyze
        </button>
        <button class="qa-btn" onclick="quickAction(this)" data-prompt="Summarize the following: ">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 4h10M3 8h7M3 12h5"/>
          </svg>
          Summarize
        </button>
        <button class="qa-btn" onclick="quickAction(this)" data-prompt="Create a build plan for: ">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="5" height="5" rx="1"/>
            <rect x="9" y="2" width="5" height="5" rx="1"/>
            <rect x="2" y="9" width="5" height="5" rx="1"/>
            <rect x="9" y="9" width="5" height="5" rx="1"/>
          </svg>
          Build Plan
        </button>
        <button class="qa-btn" onclick="quickAction(this)" data-prompt="Give me a daily report">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="12" height="12" rx="2"/>
            <path d="M5 7h6M5 10h4"/>
            <path d="M5 4.5h2"/>
          </svg>
          Daily Report
        </button>
      </div>
    </div>
  </div>

  <!-- Messages — starts hidden; shown on first message send -->
  <div id="messages">
    <div class="feed" id="feed">
      <div id="msg-list"></div>
    </div>
  </div>

  <div id="input-area">
    <div class="input-wrap">
      <div class="input-shell">
        <textarea id="inp" rows="1" placeholder="Message ARIA… or type / for commands" autocomplete="off" spellcheck="true"></textarea>
        <button id="send-btn" disabled>
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 13V3M3 8l5-5 5 5"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

</div>
<script>
(function(){
  'use strict';
  const API='', UID='user-1', CHAR_MS=12;

  const $msgs    = document.getElementById('messages'),
        $list    = document.getElementById('msg-list'),
        $landing = document.getElementById('landing'),
        $inp     = document.getElementById('inp'),
        $btn     = document.getElementById('send-btn'),
        $pip     = document.getElementById('pip');

  marked.setOptions({breaks:true, gfm:true});

  // started tracks whether any message has been sent this session
  let busy = false, started = false;

  /* ── Input resize + button state ── */
  $inp.addEventListener('input', () => {
    $inp.style.height = 'auto';
    $inp.style.height = Math.min($inp.scrollHeight, 160) + 'px';
    $btn.disabled = !$inp.value.trim() || busy;
  });

  $inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!$btn.disabled) submit(); }
  });

  $btn.addEventListener('click', submit);
  document.getElementById('clear-btn').addEventListener('click', clearChat);

  /* ── Quick action fills input ── */
  window.quickAction = function(btn) {
    const prompt = btn.dataset.prompt || btn.textContent.trim();
    $inp.value = prompt;
    $inp.dispatchEvent(new Event('input'));
    $inp.focus();
    const len = $inp.value.length;
    $inp.setSelectionRange(len, len);
  };

  /* ── Message builders ── */
  function addUser(text) {
    const d = document.createElement('div'); d.className = 'msg user-msg';
    const b = document.createElement('div'); b.className = 'user-bubble';
    b.textContent = text;
    d.appendChild(b);
    $list.appendChild(d);
    scroll();
  }

  function addAria() {
    const d = document.createElement('div'); d.className = 'msg aria-msg';
    d.innerHTML = '<div class="aria-av"><span class="aria-av-letter">A</span></div>'
                + '<div class="aria-content"><div class="aria-label">ARIA</div>'
                + '<div class="aria-body"></div></div>';
    $list.appendChild(d);
    scroll();
    return d.querySelector('.aria-body');
  }

  function showThinking(body) {
    body.innerHTML = '<div class="thinking">'
      + '<div class="thinking-dot"></div>'
      + '<div class="thinking-dot"></div>'
      + '<div class="thinking-dot"></div></div>';
    scroll();
  }

  async function typeReply(body, text) {
    body.innerHTML = '';
    const c = document.createElement('div'); c.className = 'prose'; body.appendChild(c);
    const cur = document.createElement('span'); cur.className = 'type-cursor';
    for (const ch of text) {
      cur.remove();
      c.appendChild(ch === '\n' ? document.createElement('br') : document.createTextNode(ch));
      c.appendChild(cur);
      scroll();
      await sleep(CHAR_MS);
    }
    cur.remove();
    c.innerHTML = marked.parse(text);
    scroll();
  }

  /* ── Submit — messages appended, never replaced ── */
  async function submit() {
    const text = $inp.value.trim();
    if (!text || busy) return;

    busy = true;
    $btn.disabled = true;
    $inp.value = '';
    $inp.style.height = 'auto';

    // On first message: swap landing for messages view.
    // This is the fix: landing and messages are fully separate DOM trees,
    // so hiding landing cannot affect the messages list.
    if (!started) {
      started = true;
      $landing.classList.add('hidden');
      $msgs.classList.add('visible');
      const sep = document.createElement('div'); sep.className = 'date-sep';
      sep.textContent = new Date().toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});
      $list.insertAdjacentElement('beforebegin', sep);
    }

    // Append user message — never overwrites existing messages
    addUser(text);

    const body = addAria();
    showThinking(body);
    setStatus(true);

    try {
      const r = await fetch(`${API}/api/aria/chat`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({userId: UID, message: text})
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const {reply} = await r.json();
      await typeReply(body, reply || "I've noted that down.");
    } catch(e) {
      await typeReply(body, `*Could not reach ARIA* — ${e.message}`);
    } finally {
      busy = false;
      setStatus(false);
      $btn.disabled = !$inp.value.trim();
      $inp.focus();
    }
  }

  /* ── Utilities ── */
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
  function scroll() { requestAnimationFrame(() => { $msgs.scrollTop = $msgs.scrollHeight; }); }
  function setStatus(on) { $pip.className = on ? 'h-pip thinking' : 'h-pip'; }

  function clearChat() {
    started = false;
    $list.innerHTML = '';
    document.querySelectorAll('.date-sep').forEach(el => el.remove());
    $msgs.classList.remove('visible');
    $landing.classList.remove('hidden');
  }

  setTimeout(() => $inp.focus(), 150);
})();
</script>
</body>
</html>
