<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>ARIA Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

:root {
  --bg:    #000;
  --bg2:   #0a0a0a;
  --panel: #0d0d0d;
  --b:     #1e1e1e;
  --b2:    #2a2a2a;
  --gr:    #00ff41;
  --gr2:   #00c832;
  --gr3:   #007a1f;
  --am:    #ffb300;
  --tx:    #c8e8c8;
  --tx2:   #4a7a4a;
  --tx3:   #2a4a2a;
  --f:     'JetBrains Mono','Fira Code','Cascadia Code',monospace;
}

html, body {
  height:100%; overflow:hidden; background:var(--bg);
  color:var(--gr); font-family:var(--f); font-size:13px;
  line-height:1.5; -webkit-font-smoothing:antialiased;
}

/* CRT scanlines */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);
}
/* vignette */
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:998;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.55) 100%);
}

#app { display:flex; flex-direction:column; height:100dvh; max-width:820px; margin:0 auto; position:relative; z-index:1; }

/* ── Title bar ── */
.tbar {
  flex-shrink:0; display:flex; align-items:center; justify-content:space-between;
  height:36px; padding:0 16px; padding-top:env(safe-area-inset-top);
  background:var(--panel); border-bottom:1px solid var(--b2);
  font-size:11px;
}
.tbar-traffic { display:flex; gap:7px; align-items:center; }
.traf { width:11px; height:11px; border-radius:50%; }
.tbar-title { color:var(--tx2); letter-spacing:.5px; }
.tbar-right { display:flex; align-items:center; gap:12px; color:var(--tx3); }
.led-wrap { display:flex; align-items:center; gap:5px; }
.led { width:7px; height:7px; border-radius:50%; background:var(--gr); box-shadow:0 0 7px var(--gr); }
.led.blink { animation:lb .5s step-start infinite; }
@keyframes lb { 0%,100%{opacity:1}50%{opacity:0} }
.tbar-clr { background:none; border:none; font:500 10px/1 var(--f); color:var(--tx3); cursor:pointer; letter-spacing:.3px; transition:color .1s; }
.tbar-clr:hover { color:var(--gr); }

/* ── Output ── */
#out {
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding:14px 16px 8px; display:flex; flex-direction:column; gap:0;
  scroll-behavior:smooth;
}
#out::-webkit-scrollbar { width:2px; }
#out::-webkit-scrollbar-thumb { background:var(--b2); }

/* No bubbles — pure terminal lines */
.block { margin:1px 0; animation:lf .1s ease both; }
@keyframes lf { from{opacity:0} to{opacity:1} }

.prompt-row {
  display:flex; align-items:baseline; gap:6px;
  font-size:12px; margin-bottom:2px;
}
.ps-host { color:var(--gr2); }
.ps-sep  { color:var(--tx3); }
.ps-path { color:var(--tx2); }
.ps-gt   { color:var(--am); font-weight:600; }
.ps-gt.aria-gt { color:var(--gr); }

.out-line {
  padding:0 0 6px 0;
  font-size:12.5px; line-height:1.6;
  color:var(--tx); word-break:break-word;
}
.out-line.user-line { color:#d4f8d4; padding-left:0; }

/* no line wrapper for ARIA — just content */
.out-line.aria-out { padding-left:0; border-left:none; }

/* markdown stripped-down terminal style */
.out-line p{margin:0 0 3px} .out-line p:last-child{margin:0}
.out-line strong{color:var(--gr);font-weight:600}
.out-line em{color:var(--tx2);font-style:normal;text-decoration:underline;text-decoration-style:dotted}
.out-line ul,.out-line ol{padding-left:18px;margin:3px 0}
.out-line li{margin:1px 0;color:var(--tx)}
.out-line li::marker{color:var(--gr2)}
.out-line h1,.out-line h2,.out-line h3{font-size:12.5px;font-weight:600;color:var(--gr);margin:6px 0 3px}
.out-line h1::before{content:'[#] '} .out-line h2::before{content:'[##] '} .out-line h3::before{content:'[###] '}
.out-line code{font-family:var(--f);font-size:12px;background:rgba(0,255,65,.08);border:1px solid rgba(0,255,65,.15);border-radius:2px;padding:0 4px;color:var(--gr)}
.out-line pre{background:#060606;border:1px solid var(--b2);border-left:2px solid var(--gr3);border-radius:0;padding:8px 12px;overflow-x:auto;margin:5px 0}
.out-line pre code{background:none;border:none;padding:0;color:#a8e6a8;font-size:11.5px}
.out-line blockquote{border-left:2px solid var(--gr3);padding-left:10px;margin:4px 0;color:var(--tx2)}
.out-line a{color:var(--gr);text-underline-offset:2px}
.out-line hr{border:none;display:block;border-top:1px solid var(--b2);margin:6px 0}
.out-line table{border-collapse:collapse;font-size:12px;margin:5px 0;width:100%}
.out-line th{color:var(--gr);border-bottom:1px solid var(--b2);padding:3px 10px;text-align:left;font-weight:600}
.out-line td{padding:2px 10px;border-bottom:1px solid var(--b);color:var(--tx)}

/* system lines */
.sys-line { color:var(--tx3); font-size:11px; padding:4px 0; letter-spacing:.2px; }
.sys-line::before { content:'# '; }

/* typing */
.cursor-line { display:flex; align-items:center; gap:4px; padding:1px 0; }
.cur { display:inline-block; width:8px; height:14px; background:var(--gr); border-radius:1px; animation:cur .9s step-end infinite; }
@keyframes cur { 0%,100%{opacity:.9}50%{opacity:0} }

/* ── Input ── */
.inp-zone {
  flex-shrink:0;
  border-top:1px solid var(--b2);
  background:var(--bg);
  padding:10px 16px;
  padding-bottom:max(12px,env(safe-area-inset-bottom));
}
.inp-row {
  display:flex; align-items:flex-end; gap:8px;
}
.inp-ps {
  flex-shrink:0; padding-bottom:3px;
  font-size:12px; white-space:nowrap; user-select:none;
}
.inp-ps .ig { color:var(--tx2); }
.inp-ps .ia { color:var(--am); font-weight:600; }
textarea {
  flex:1; background:transparent; border:none; outline:none;
  color:var(--gr); font:12.5px/1.5 var(--f);
  resize:none; min-height:20px; max-height:110px; overflow-y:auto;
  caret-color:var(--gr); padding-bottom:2px;
}
textarea::placeholder { color:var(--tx3); font-style:italic; }
#sb {
  flex-shrink:0; height:24px; padding:0 10px;
  border:1px solid var(--gr3); border-radius:2px;
  background:transparent; color:var(--gr2);
  font:500 11px/1 var(--f); cursor:pointer; letter-spacing:.3px;
  transition:.1s; margin-bottom:2px;
}
#sb:hover { background:rgba(0,255,65,.07); border-color:var(--gr); color:var(--gr); }
#sb:active { background:rgba(0,255,65,.14); }
#sb:disabled { opacity:.2; cursor:default; }

@media(min-width:820px){
  #app{border-left:1px solid var(--b2);border-right:1px solid var(--b2)}
  #out{padding:16px 22px 10px}
  .inp-zone{padding:10px 22px;padding-bottom:16px}
  .tbar{padding:0 22px}
}
</style>
</head>
<body>
<div id="app">
  <div class="tbar">
    <div class="tbar-traffic">
      <div class="traf" style="background:#ff5f57"></div>
      <div class="traf" style="background:#febc2e"></div>
      <div class="traf" style="background:#28c840"></div>
    </div>
    <span class="tbar-title">aria — bash — 80×24</span>
    <div class="tbar-right">
      <div class="led-wrap"><div class="led" id="led"></div><span id="ltxt">LIVE</span></div>
      <button class="tbar-clr" onclick="clearChat()">[clear]</button>
    </div>
  </div>

  <div id="out"></div>

  <div class="inp-zone">
    <div class="inp-row">
      <span class="inp-ps"><span class="ig">you@aria</span><span class="ia"> ❯ </span></span>
      <textarea id="inp" rows="1" placeholder="type here and press enter…" autocomplete="off" spellcheck="false"></textarea>
      <button id="sb" disabled>RUN ↵</button>
    </div>
  </div>
</div>
<script>
(function(){
  const API='http://188.245.242.236:4000', UID='demo-user-1';
  const $out=document.getElementById('out'), $i=document.getElementById('inp'),
        $b=document.getElementById('sb'), $led=document.getElementById('led'),
        $lt=document.getElementById('ltxt');
  marked.setOptions({breaks:true,gfm:true});
  let busy=false;

  $i.addEventListener('input',()=>{ $i.style.height='auto'; $i.style.height=Math.min($i.scrollHeight,110)+'px'; $b.disabled=!$i.value.trim()||busy; });
  $i.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!$b.disabled)go();} });
  $b.addEventListener('click',go);

  function sysLine(txt){ const d=document.createElement('div'); d.className='sys-line'; d.textContent=txt; $out.appendChild(d); tick(); }

  function addBlock(role, content){
    const block=document.createElement('div'); block.className='block';

    const pr=document.createElement('div'); pr.className='prompt-row';
    if(role==='user'){
      pr.innerHTML=`<span class="ps-host">you@client</span><span class="ps-sep">:</span><span class="ps-path">~</span><span class="ps-gt"> ❯</span>`;
    } else {
      pr.innerHTML=`<span class="ps-host">aria@system</span><span class="ps-sep">:</span><span class="ps-path">~</span><span class="ps-gt aria-gt"> →</span>`;
    }

    const ln=document.createElement('div');
    ln.className='out-line '+(role==='user'?'user-line':'aria-out');
    if(role==='aria') ln.innerHTML=marked.parse(content);
    else ln.textContent=content;

    block.append(pr,ln); $out.appendChild(block); tick();
  }

  function addTyping(){
    const block=document.createElement('div'); block.className='block'; block.id='ty';
    const pr=document.createElement('div'); pr.className='prompt-row';
    pr.innerHTML=`<span class="ps-host">aria@system</span><span class="ps-sep">:</span><span class="ps-path">~</span><span class="ps-gt aria-gt"> →</span>`;
    const ln=document.createElement('div'); ln.className='cursor-line';
    ln.innerHTML='<span style="color:var(--tx2);font-size:12px">processing</span><span class="cur"></span>';
    block.append(pr,ln); $out.appendChild(block); tick();
  }

  function removeTyping(){ document.getElementById('ty')?.remove(); }
  function tick(){ requestAnimationFrame(()=>{ $out.scrollTop=$out.scrollHeight; }); }

  function setStatus(on){
    $led.className='led'+(on?' blink':'');
    $lt.textContent=on?'BUSY':'LIVE';
  }

  async function go(){
    const txt=$i.value.trim(); if(!txt||busy)return;
    busy=true; $b.disabled=true; $i.value=''; $i.style.height='auto';
    addBlock('user',txt); addTyping(); setStatus(true);
    try{
      const r=await fetch(`${API}/api/aria/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:UID,message:txt})});
      removeTyping();
      if(!r.ok)throw new Error('HTTP '+r.status);
      const{reply}=await r.json();
      addBlock('aria',reply||"I've noted that down.");
    }catch(e){ removeTyping(); sysLine('ERR: '+e.message); }
    finally{ busy=false; setStatus(false); $i.focus(); }
  }

  window.clearChat=()=>{ $out.innerHTML=''; sysLine('session cleared — '+new Date().toLocaleTimeString()); addBlock('aria','Buffer cleared. Awaiting input.'); };

  sysLine('ARIA terminal v1.0 — session started '+new Date().toLocaleTimeString());
  addBlock('aria',"System ready. What's on your agenda today?");
  setTimeout(()=>$i.focus(),300);
})();
</script>
</body>
</html>
