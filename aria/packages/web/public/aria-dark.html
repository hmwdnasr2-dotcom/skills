<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>ARIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0a0a0a;
  --bg2:     #111;
  --s1:      #161616;
  --s2:      #1c1c1c;
  --b1:      #2a2a2a;
  --b2:      #333;
  --acc:     #3b82f6;
  --acc2:    #60a5fa;
  --tx:      #e8e8e8;
  --tx2:     #888;
  --tx3:     #444;
  --grn:     #22c55e;
  --f:       'Inter', system-ui, sans-serif;
}

html, body { height:100%; background:var(--bg); color:var(--tx); font-family:var(--f); font-size:14px; line-height:1.55; -webkit-font-smoothing:antialiased; overflow:hidden; }

#app { display:flex; flex-direction:column; height:100dvh; max-width:680px; margin:0 auto; }

/* ── Bar ── */
nav {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 18px; height:48px;
  padding-top:env(safe-area-inset-top);
  border-bottom:1px solid var(--b1);
  background:var(--bg);
  flex-shrink:0;
}
.nav-left { display:flex; align-items:center; gap:10px; }
.n-dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--grn); box-shadow:0 0 0 2px rgba(34,197,94,.15);
}
.n-dot.off { background:var(--acc); animation:nd .8s ease-in-out infinite; }
@keyframes nd { 0%,100%{opacity:1}50%{opacity:.2} }
.n-name { font-size:13px; font-weight:600; color:var(--tx); letter-spacing:.1px; }
.n-sub  { font-size:11px; color:var(--tx3); }
.nav-right { display:flex; gap:6px; }
.n-btn {
  height:28px; padding:0 10px; border-radius:6px;
  border:1px solid var(--b1); background:transparent;
  color:var(--tx3); font:500 11px/1 var(--f); cursor:pointer; transition:.12s;
}
.n-btn:hover { border-color:var(--b2); color:var(--tx2); }

/* ── Messages ── */
#feed {
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding:24px 18px 12px;
  display:flex; flex-direction:column; gap:2px;
  scroll-behavior:smooth;
}
#feed::-webkit-scrollbar { width:2px; }
#feed::-webkit-scrollbar-thumb { background:var(--s2); }

.row {
  display:flex; align-items:flex-end; gap:9px;
  animation:fi .18s ease both;
}
.row.you { flex-direction:row-reverse; }
@keyframes fi { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* avatar */
.av {
  width:28px; height:28px; border-radius:8px;
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; color:#fff; margin-bottom:1px;
}
.av.aria-av { background:var(--acc); }
.av.you-av  { background:var(--s2); border:1px solid var(--b1); color:var(--tx2); }

.bub {
  max-width:min(76%,520px);
  padding:9px 13px 10px; border-radius:14px;
  font-size:13.5px; line-height:1.62; word-break:break-word;
}
.row.aria .bub {
  background:var(--s1); border:1px solid var(--b1);
  color:var(--tx); border-bottom-left-radius:3px;
}
.row.you .bub {
  background:var(--acc); color:#fff; border-bottom-right-radius:3px;
}

/* consecutive: hide av, shrink gap */
.row.aria + .row.aria .av,
.row.you  + .row.you  .av { visibility:hidden; }
.row.aria + .row.aria .bub { border-top-left-radius:5px; }
.row.you  + .row.you  .bub { border-top-right-radius:5px; }

/* markdown */
.bub p { margin:0 0 6px } .bub p:last-child { margin:0 }
.bub strong { font-weight:600; color:#fff }
.bub em { color:var(--tx2); font-style:italic }
.bub ul,.bub ol { padding-left:16px; margin:4px 0 }
.bub li { margin:2px 0 }
.bub h1,.bub h2,.bub h3 { font-weight:600; margin:8px 0 4px; font-size:13.5px }
.bub code { font:12px/1 'SF Mono',monospace; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.07); border-radius:4px; padding:1px 5px; color:var(--acc2) }
.bub pre  { background:#000; border:1px solid var(--b1); border-radius:8px; padding:10px 12px; overflow-x:auto; margin:7px 0 }
.bub pre code { background:none; border:none; padding:0; color:#93c5fd }
.bub blockquote { border-left:2px solid var(--acc); padding-left:10px; margin:6px 0; color:var(--tx2); font-style:italic }
.bub a { color:var(--acc2); text-underline-offset:2px }
.bub hr { border:none; border-top:1px solid var(--b1); margin:8px 0 }

/* typing */
.typing-bub {
  background:var(--s1); border:1px solid var(--b1);
  border-radius:14px; border-bottom-left-radius:3px;
  padding:11px 14px; display:inline-flex; align-items:center; gap:4px;
}
.td { width:4px; height:4px; border-radius:50%; background:var(--tx3); animation:td 1.2s ease-in-out infinite; }
.td:nth-child(2){animation-delay:.13s} .td:nth-child(3){animation-delay:.26s}
@keyframes td { 0%,60%,100%{opacity:.25;transform:scale(1)} 30%{opacity:1;transform:scale(1.4)} }

/* date */
.day { display:flex; align-items:center; gap:10px; color:var(--tx3); font-size:10.5px; font-weight:500; letter-spacing:.5px; text-transform:uppercase; margin:14px 0 8px; }
.day::before,.day::after { content:''; flex:1; height:1px; background:var(--b1); }

/* ── Input ── */
footer {
  flex-shrink:0;
  padding:10px 18px;
  padding-bottom:max(12px,env(safe-area-inset-bottom));
  border-top:1px solid var(--b1);
  background:var(--bg);
}
.inp-shell {
  display:flex; align-items:flex-end; gap:8px;
  background:var(--s1); border:1px solid var(--b1);
  border-radius:12px; padding:9px 9px 9px 13px;
  transition:border-color .15s, box-shadow .15s;
}
.inp-shell:focus-within { border-color:var(--b2); box-shadow:0 0 0 2px rgba(59,130,246,.07); }
textarea {
  flex:1; background:none; border:none; outline:none;
  color:var(--tx); font:13.5px/1.55 var(--f);
  resize:none; min-height:21px; max-height:128px; overflow-y:auto;
  caret-color:var(--acc2);
}
textarea::placeholder { color:var(--tx3); }
#sb {
  width:30px; height:30px; border-radius:8px; border:none;
  background:var(--acc); color:#fff; cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  transition:all .12s;
}
#sb:hover { background:var(--acc2); }
#sb:active { transform:scale(.93); }
#sb:disabled { background:var(--s2); opacity:.35; cursor:default; }

@media(min-width:680px){
  body { background:#060606; }
  #app { border-left:1px solid var(--b1); border-right:1px solid var(--b1); }
  #feed { padding:28px 22px 14px; }
  footer { padding:12px 22px; padding-bottom:16px; }
  nav { padding:0 22px; }
}
</style>
</head>
<body>
<div id="app">
  <nav>
    <div class="nav-left">
      <div class="n-dot" id="ndot"></div>
      <div>
        <div class="n-name">ARIA</div>
        <div class="n-sub" id="nsub">Ready</div>
      </div>
    </div>
    <div class="nav-right">
      <button class="n-btn" onclick="clearChat()">Clear</button>
    </div>
  </nav>

  <div id="feed">
    <div class="day">Today</div>
  </div>

  <footer>
    <div class="inp-shell">
      <textarea id="inp" rows="1" placeholder="Message…" autocomplete="off" spellcheck="true"></textarea>
      <button id="sb" disabled>
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 13V3M3 8l5-5 5 5"/></svg>
      </button>
    </div>
  </footer>
</div>
<script>
(function(){
  const API='http://188.245.242.236:4000', UID='demo-user-1';
  const $f=document.getElementById('feed'), $i=document.getElementById('inp'),
        $b=document.getElementById('sb'), $d=document.getElementById('ndot'),
        $s=document.getElementById('nsub');
  marked.setOptions({breaks:true,gfm:true});
  let busy=false;

  $i.addEventListener('input',()=>{ $i.style.height='auto'; $i.style.height=Math.min($i.scrollHeight,128)+'px'; $b.disabled=!$i.value.trim()||busy; });
  $i.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!$b.disabled)go();} });
  $b.addEventListener('click',go);

  function addRow(role,txt){
    const row=document.createElement('div'); row.className='row '+role;
    const av=document.createElement('div'); av.className='av '+(role==='aria'?'aria-av':'you-av'); av.textContent=role==='aria'?'A':'Y';
    const bub=document.createElement('div'); bub.className='bub';
    if(role==='aria') bub.innerHTML=marked.parse(txt); else bub.textContent=txt;
    row.append(av,bub); $f.appendChild(row); tick();
  }

  function addTyping(){
    const row=document.createElement('div'); row.className='row aria'; row.id='ty';
    const av=document.createElement('div'); av.className='av aria-av'; av.textContent='A';
    const w=document.createElement('div'); w.className='typing-bub';
    w.innerHTML='<div class="td"></div><div class="td"></div><div class="td"></div>';
    row.append(av,w); $f.appendChild(row); tick();
  }

  function removeTyping(){ document.getElementById('ty')?.remove(); }
  function tick(){ requestAnimationFrame(()=>{ $f.scrollTop=$f.scrollHeight; }); }

  function setStatus(on){
    $d.className='n-dot'+(on?' off':'');
    $s.textContent=on?'Thinking…':'Ready';
  }

  async function go(){
    const txt=$i.value.trim(); if(!txt||busy)return;
    busy=true; $b.disabled=true; $i.value=''; $i.style.height='auto';
    addRow('you',txt); addTyping(); setStatus(true);
    try{
      const r=await fetch(`${API}/api/aria/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:UID,message:txt})});
      removeTyping();
      if(!r.ok)throw new Error('HTTP '+r.status);
      const{reply}=await r.json();
      addRow('aria',reply||"I've noted that down.");
    }catch(e){ removeTyping(); addRow('aria',`_Error: ${e.message}_`); }
    finally{ busy=false; setStatus(false); $i.focus(); }
  }

  window.clearChat=()=>{ $f.innerHTML='<div class="day">Today</div>'; addRow('aria','Cleared. What would you like to work on?'); };
  addRow('aria',"Good to see you. What's on your agenda today?");
  setTimeout(()=>$i.focus(),300);
})();
</script>
</body>
</html>
