<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<title>ARIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: #0d0d0d;
  color: #d4d4d4;
  font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  height: 100vh;
}

/* ── Log entries ── */
#log-entries {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px 28px 12px;
  scroll-behavior: smooth;
}

#log-entries::-webkit-scrollbar { width: 3px; }
#log-entries::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

.log-line {
  display: flex;
  gap: 0;
  padding: 1px 0;
  word-break: break-word;
}

.log-ts {
  color: #444;
  flex-shrink: 0;
  user-select: none;
  margin-right: 10px;
}

.log-speaker {
  font-weight: 600;
  flex-shrink: 0;
  width: 56px;
  margin-right: 6px;
}

.log-line--aria   .log-speaker { color: #7ec8e3; }
.log-line--you    .log-speaker { color: #c8e37e; }
.log-line--system .log-speaker { color: #666; }
.log-line--system { opacity: 0.65; }

.log-content {
  flex: 1;
  white-space: pre-wrap;
}

/* Blinking cursor during streaming */
.cursor {
  display: inline-block;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

/* Divider lines */
.log-divider {
  color: #222;
  padding: 6px 0 6px 72px;
  user-select: none;
}

/* Boot / starter prompt lines (clickable) */
.log-starter {
  cursor: pointer;
}
.log-starter .log-content {
  text-decoration: none;
}
.log-starter:hover .log-content {
  color: #c8e37e;
}

/* ── Input row ── */
#input-area {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 28px;
  padding-bottom: max(14px, env(safe-area-inset-bottom));
  border-top: 1px solid #1e1e1e;
  background: #0d0d0d;
}

#prompt-symbol {
  color: #7ec8e3;
  font-weight: 600;
  user-select: none;
  flex-shrink: 0;
}

#inp {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #d4d4d4;
  font-family: inherit;
  font-size: inherit;
  line-height: 1.6;
  caret-color: #7ec8e3;
}
#inp::placeholder { color: #3a3a3a; }
#inp:disabled { opacity: 0.4; cursor: not-allowed; }

/* Hint text */
#input-hint {
  flex-shrink: 0;
  color: #333;
  font-size: 11px;
  user-select: none;
  white-space: nowrap;
}

@media (max-width: 600px) {
  #log-entries { padding: 14px 16px 8px; }
  #input-area  { padding: 10px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
  #input-hint  { display: none; }
}
</style>
</head>
<body>
<div id="app">
  <div id="log-entries" role="log" aria-live="polite" aria-label="Conversation log">
    <div id="log-list"></div>
  </div>
  <div id="input-area">
    <span id="prompt-symbol" aria-hidden="true">&gt;</span>
    <input id="inp" type="text" placeholder="type a message…" autocomplete="off" spellcheck="true" aria-label="Message input">
    <span id="input-hint">Enter ↵ to send</span>
  </div>
</div>

<script>
(function () {
  'use strict';

  const API    = 'http://188.245.242.236:4000';
  const UID    = 'user-1';
  const TYPE_MS = 8;

  const $entries = document.getElementById('log-entries');
  const $list    = document.getElementById('log-list');
  const $inp     = document.getElementById('inp');

  let busy = false;

  /* ── Helpers ── */

  function now() {
    return new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  }

  function scroll() {
    requestAnimationFrame(() => { $entries.scrollTop = $entries.scrollHeight; });
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  /**
   * Append a single log line. Returns the content <span> so callers can
   * update it (e.g. streaming).
   */
  function appendLine(speaker, text, opts = {}) {
    const row = document.createElement('div');
    row.className = 'log-line log-line--' + speaker.toLowerCase();
    if (opts.starter) row.classList.add('log-starter');

    const tsEl  = document.createElement('span');
    tsEl.className   = 'log-ts';
    tsEl.textContent = '[' + now() + ']';

    const spkEl = document.createElement('span');
    spkEl.className   = 'log-speaker';
    spkEl.textContent = speaker.padEnd(6);

    const cEl = document.createElement('span');
    cEl.className   = 'log-content';
    cEl.textContent = text;

    row.appendChild(tsEl);
    row.appendChild(spkEl);
    row.appendChild(cEl);
    $list.appendChild(row);
    scroll();

    if (opts.starter) {
      row.addEventListener('click', () => {
        if (busy) return;
        $inp.value = opts.starterText || text;
        $inp.focus();
        submit();
      });
    }

    return { row, cEl };
  }

  function appendDivider() {
    const d = document.createElement('div');
    d.className   = 'log-divider';
    d.textContent = '─'.repeat(64);
    $list.appendChild(d);
    scroll();
  }

  /** Remove an element from the log. */
  function removeLine(row) { row.remove(); }

  /**
   * Animate text into a content span character by character, with a
   * blinking ▌ cursor that disappears when done.
   */
  async function typeInto(cEl, text) {
    cEl.textContent = '';
    const cur = document.createElement('span');
    cur.className   = 'cursor';
    cur.textContent = '▌';
    cEl.appendChild(cur);

    for (const ch of text) {
      cur.remove();
      cEl.appendChild(document.createTextNode(ch));
      cEl.appendChild(cur);
      scroll();
      await sleep(TYPE_MS);
    }
    cur.remove();
    scroll();
  }

  /**
   * Convert a markdown-flavored reply into one or more plain-text lines
   * suitable for command-log display.
   * Rules: ## Heading → ALL CAPS · - item → ▸ item · **bold** stripped
   */
  function replyToLines(text) {
    return text
      .replace(/\r\n/g, '\n')
      .split('\n')
      .map(line => {
        line = line.replace(/\*\*(.+?)\*\*/g, '$1')
                   .replace(/\*(.+?)\*/g, '$1')
                   .replace(/`(.+?)`/g, '$1');
        if (/^#{1,3}\s/.test(line)) return line.replace(/^#{1,3}\s+/, '').toUpperCase();
        if (/^[-*]\s/.test(line))   return '▸ ' + line.replace(/^[-*]\s+/, '');
        return line;
      })
      .join('\n')
      .replace(/\n{3,}/g, '\n\n')
      .trim();
  }

  /* ── Send flow ── */

  async function submit() {
    const text = $inp.value.trim();
    if (!text || busy) return;

    busy = true;
    $inp.disabled = true;
    $inp.value = '';

    appendLine('YOU', text);

    const { row: sysRow } = appendLine('SYSTEM', 'processing…');

    try {
      const r = await fetch(`${API}/api/aria/chat`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ userId: UID, message: text })
      });

      if (!r.ok) throw new Error('HTTP ' + r.status);
      const { reply } = await r.json();

      removeLine(sysRow);

      const cleaned = replyToLines(reply || "I've noted that down.");
      const lines   = cleaned.split('\n');

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        if (!line) continue;
        if (i === 0) {
          const { cEl } = appendLine('ARIA', '');
          await typeInto(cEl, line);
        } else {
          appendLine('ARIA', line);
        }
      }

    } catch (e) {
      removeLine(sysRow);
      appendLine('SYSTEM', 'error: ' + e.message);
    } finally {
      busy = false;
      $inp.disabled = false;
      $inp.focus();
    }
  }

  /* ── Input handling ── */

  $inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
  });

  /* ── SSE — proactive events ── */

  function connectSSE() {
    const es = new EventSource(`${API}/api/aria/events?userId=${UID}`);
    es.onmessage = e => {
      try {
        const { content } = JSON.parse(e.data);
        if (content) appendLine('ARIA', content);
      } catch (_) {}
    };
    es.onerror = () => {
      es.close();
      setTimeout(connectSSE, 6000);
    };
  }

  /* ── Boot sequence ── */

  appendLine('SYSTEM', 'ARIA v1.0  •  connected to ' + API);
  appendDivider();
  appendLine('ARIA', 'Ready. How can I help you today?');
  appendLine('ARIA', ' ');
  appendLine('ARIA', '▸ What\'s on my plate today?',          { starter: true, starterText: "What's on my plate today?" });
  appendLine('ARIA', '▸ Create a new project',               { starter: true, starterText: 'Create a new project' });
  appendLine('ARIA', '▸ What tasks are overdue?',            { starter: true, starterText: 'What tasks are overdue?' });
  appendLine('ARIA', '▸ Summarize my week',                  { starter: true, starterText: 'Summarize my week' });
  appendDivider();

  connectSSE();
  setTimeout(() => $inp.focus(), 100);
})();
</script>
</body>
</html>
