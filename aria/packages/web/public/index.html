<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F4F3EE">
<title>ARIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<style>
/* ── Reset ───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Design tokens (Claude / getdesign) ─────────────── */
:root {
  /* Brand */
  --pampas:   #F4F3EE;   /* background */
  --crail:    #C15F3C;   /* primary accent — warm terracotta */
  --crail-2:  #A8502F;   /* hover */
  --crail-dim:rgba(193,95,60,0.10);
  --crail-rim:rgba(193,95,60,0.22);
  --cloudy:   #B1ADA1;   /* muted gray */

  /* Surfaces */
  --bg:       #F4F3EE;
  --bg-deep:  #EDECEA;
  --white:    #FFFFFF;
  --border:   rgba(0,0,0,0.07);
  --border-2: rgba(0,0,0,0.11);

  /* Text */
  --tx:       #1C1714;   /* warm near-black */
  --tx-2:     #5C5651;   /* body secondary */
  --tx-3:     #9E9A93;   /* meta, muted */
  --tx-inv:   #FFFFFF;

  /* Status */
  --online:   #3D9E6E;

  /* Fonts */
  --font-ui:  'Poppins', system-ui, sans-serif;
  --font-body:'Lora', Georgia, serif;
  --font-mono:'SF Mono','Fira Code', monospace;

  /* Motion */
  --ease: cubic-bezier(0.2, 0, 0, 1);
}

/* ── Base ────────────────────────────────────────────── */
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--tx);
  font-family: var(--font-ui);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
}

/* ── App shell ───────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  height: 100vh;
}

/* ── Header ──────────────────────────────────────────── */
header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  height: 58px;
  padding-top: env(safe-area-inset-top);
  background: var(--white);
  border-bottom: 1px solid var(--border);
}

.h-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ARIA logo mark */
.logo-mark {
  width: 34px;
  height: 34px;
  border-radius: 10px;
  background: var(--crail);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.logo-mark svg { display: block; }

.logo-name {
  font-family: var(--font-ui);
  font-size: 17px;
  font-weight: 700;
  color: var(--tx);
  letter-spacing: -0.3px;
}

.h-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--tx-3);
}
.h-pip {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--online);
  flex-shrink: 0;
}
.h-pip.thinking {
  background: var(--crail);
  animation: pip-pulse 0.8s ease-in-out infinite;
}
@keyframes pip-pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

.h-actions { display: flex; gap: 6px; }
.h-btn {
  height: 32px;
  padding: 0 14px;
  border-radius: 8px;
  border: 1px solid var(--border-2);
  background: transparent;
  color: var(--tx-3);
  font: 500 12px/1 var(--font-ui);
  cursor: pointer;
  transition: all 0.15s var(--ease);
}
.h-btn:hover {
  background: var(--bg-deep);
  color: var(--tx-2);
  border-color: var(--border-2);
}

/* ── Messages ────────────────────────────────────────── */
#messages {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  scroll-behavior: smooth;
}
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb {
  background: var(--cloudy);
  border-radius: 2px;
  opacity: 0.5;
}

/* Centered column */
.feed {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 28px 12px;
}

/* ── Date divider ── */
.date-line {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 28px 0 20px;
  color: var(--tx-3);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  font-family: var(--font-ui);
}
.date-line::before, .date-line::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Message row ── */
.msg {
  padding: 18px 0;
  animation: msg-in 0.22s var(--ease) both;
}
.msg + .msg { border-top: 1px solid var(--border); }

@keyframes msg-in {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── User message ── */
.msg.user {
  display: flex;
  justify-content: flex-end;
}

.user-bub {
  max-width: min(72%, 520px);
  background: var(--crail-dim);
  border: 1px solid var(--crail-rim);
  border-radius: 20px 20px 5px 20px;
  padding: 13px 18px;
  font-family: var(--font-ui);
  font-size: 15px;
  line-height: 1.6;
  color: var(--tx);
  word-break: break-word;
}

/* ── ARIA message ── */
.msg.aria {
  display: flex;
  align-items: flex-start;
  gap: 14px;
}

.aria-av {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  background: var(--crail);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 3px;
}
.aria-av svg { display: block; }

.aria-body {
  flex: 1;
  min-width: 0;
}

.aria-name {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 600;
  color: var(--tx-3);
  margin-bottom: 7px;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

/* ── Markdown prose (Lora body font) ── */
.prose {
  font-family: var(--font-body);
  font-size: 15.5px;
  line-height: 1.75;
  color: var(--tx);
}

.prose p {
  margin: 0 0 14px;
}
.prose p:last-child { margin-bottom: 0; }

.prose strong {
  font-weight: 600;
  color: var(--tx);
  font-family: var(--font-ui);
}

.prose em {
  font-style: italic;
  color: var(--tx-2);
}

.prose h1, .prose h2, .prose h3 {
  font-family: var(--font-ui);
  font-weight: 600;
  line-height: 1.35;
  color: var(--tx);
  margin: 22px 0 10px;
}
.prose h1 { font-size: 19px; }
.prose h2 { font-size: 17px; }
.prose h3 { font-size: 15px; }
.prose h1:first-child,
.prose h2:first-child,
.prose h3:first-child { margin-top: 0; }

.prose ul, .prose ol {
  padding-left: 22px;
  margin: 10px 0 14px;
}
.prose li {
  margin: 8px 0;
  line-height: 1.7;
}
.prose li::marker {
  color: var(--crail);
  font-size: 14px;
}
.prose li > p { margin: 0; }

.prose code {
  font-family: var(--font-mono);
  font-size: 13px;
  background: rgba(0,0,0,0.05);
  border: 1px solid var(--border-2);
  border-radius: 5px;
  padding: 2px 6px;
  color: var(--crail-2);
}

.prose pre {
  background: #1C1714;
  border-radius: 10px;
  padding: 16px 18px;
  overflow-x: auto;
  margin: 14px 0;
}
.prose pre code {
  background: none;
  border: none;
  padding: 0;
  color: #e8d5c8;
  font-size: 13px;
  line-height: 1.65;
}

.prose blockquote {
  border-left: 3px solid var(--crail);
  padding-left: 16px;
  margin: 14px 0;
  color: var(--tx-2);
  font-style: italic;
}

.prose hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 18px 0;
}

.prose a {
  color: var(--crail);
  text-decoration: underline;
  text-underline-offset: 3px;
}

.prose table {
  border-collapse: collapse;
  width: 100%;
  margin: 14px 0;
  font-size: 14px;
  font-family: var(--font-ui);
}
.prose th {
  background: var(--bg-deep);
  padding: 9px 14px;
  text-align: left;
  font-weight: 600;
  border-bottom: 1px solid var(--border-2);
  color: var(--tx);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.prose td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--tx-2);
}

/* ── Typing indicator ── */
.typing-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
}
.typing-label {
  font-family: var(--font-ui);
  font-size: 13px;
  color: var(--tx-3);
  font-style: italic;
}
.dots {
  display: flex;
  align-items: center;
  gap: 4px;
}
.dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--cloudy);
  animation: dot-bounce 1.2s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.15s; }
.dot:nth-child(3) { animation-delay: 0.30s; }
@keyframes dot-bounce {
  0%, 60%, 100% { opacity: 0.35; transform: translateY(0); }
  30%            { opacity: 1;    transform: translateY(-4px); }
}

/* ── Welcome state ── */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  padding: 60px 28px 40px;
  text-align: center;
  min-height: 50vh;
}
.welcome-mark {
  width: 56px; height: 56px;
  border-radius: 16px;
  background: var(--crail);
  display: flex; align-items: center; justify-content: center;
}
.welcome-title {
  font-family: var(--font-ui);
  font-size: 22px;
  font-weight: 600;
  color: var(--tx);
  letter-spacing: -0.3px;
}
.welcome-sub {
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--tx-2);
  max-width: 380px;
  line-height: 1.65;
}
.starter-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-top: 6px;
}
.chip {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid var(--border-2);
  background: var(--white);
  font-family: var(--font-ui);
  font-size: 13px;
  color: var(--tx-2);
  cursor: pointer;
  transition: all 0.15s var(--ease);
  text-align: left;
}
.chip:hover {
  border-color: var(--crail-rim);
  background: var(--crail-dim);
  color: var(--tx);
}

/* ── Input area ── */
#input-area {
  flex-shrink: 0;
  padding: 14px 28px;
  padding-bottom: max(20px, env(safe-area-inset-bottom));
  background: var(--white);
  border-top: 1px solid var(--border);
}

.input-wrap {
  max-width: 720px;
  margin: 0 auto;
}

.input-shell {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--bg);
  border: 1.5px solid var(--border-2);
  border-radius: 18px;
  padding: 12px 12px 12px 18px;
  transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
}
.input-shell:focus-within {
  border-color: rgba(193,95,60,0.45);
  box-shadow: 0 0 0 3px rgba(193,95,60,0.08);
}

textarea#inp {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--tx);
  font-family: var(--font-ui);
  font-size: 15px;
  line-height: 1.55;
  resize: none;
  min-height: 24px;
  max-height: 160px;
  overflow-y: auto;
  caret-color: var(--crail);
}
textarea#inp::placeholder {
  color: var(--tx-3);
}
textarea#inp::-webkit-scrollbar { width: 3px; }
textarea#inp::-webkit-scrollbar-thumb { background: var(--cloudy); }

#send {
  width: 38px;
  height: 38px;
  border-radius: 11px;
  border: none;
  background: var(--crail);
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s var(--ease);
  box-shadow: 0 2px 8px rgba(193,95,60,0.28);
}
#send:hover {
  background: var(--crail-2);
  box-shadow: 0 4px 16px rgba(193,95,60,0.38);
  transform: translateY(-1px);
}
#send:active { transform: scale(0.93) translateY(0); }
#send:disabled {
  background: var(--bg-deep);
  box-shadow: none;
  cursor: not-allowed;
  opacity: 0.5;
  transform: none;
}

.input-hint {
  margin-top: 9px;
  text-align: center;
  font-size: 11px;
  color: var(--tx-3);
  font-family: var(--font-ui);
}

/* ── Responsive ── */
@media (max-width: 600px) {
  header { padding: 0 16px; }
  .feed  { padding: 0 16px 12px; }
  #input-area { padding: 12px 16px; padding-bottom: max(20px, env(safe-area-inset-bottom)); }
  .user-bub { max-width: 88%; }
  .welcome { padding: 40px 20px 28px; }
}

@media (min-width: 900px) {
  .feed { padding: 0 48px 12px; }
  #input-area { padding: 16px 48px; padding-bottom: 24px; }
}
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="h-brand">
      <div class="logo-mark">
        <!-- A glyph -->
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
          <path d="M10 2L17.5 17H2.5L10 2Z" fill="white" fill-opacity="0.92" stroke="none"/>
          <path d="M7 13h6" stroke="rgba(255,255,255,0.55)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="logo-name">ARIA</span>
    </div>

    <div class="h-status">
      <div class="h-pip" id="pip"></div>
      <span id="status-text">Ready</span>
    </div>

    <div class="h-actions">
      <button class="h-btn" onclick="clearChat()">Clear</button>
    </div>
  </header>

  <!-- Messages -->
  <div id="messages">
    <div class="feed" id="feed">
      <!-- Welcome screen -->
      <div class="welcome" id="welcome">
        <div class="welcome-mark">
          <svg width="26" height="26" viewBox="0 0 20 20" fill="none">
            <path d="M10 2L17.5 17H2.5L10 2Z" fill="white" fill-opacity="0.92"/>
            <path d="M7 13h6" stroke="rgba(255,255,255,0.55)" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="welcome-title">How can I help you today?</div>
        <div class="welcome-sub">I can help you plan tasks, track projects, follow up on work, and keep your week organized.</div>
        <div class="starter-chips">
          <button class="chip" onclick="useStarter(this)">📋 What's on my plate today?</button>
          <button class="chip" onclick="useStarter(this)">🚀 Create a new project</button>
          <button class="chip" onclick="useStarter(this)">⏰ What tasks are overdue?</button>
          <button class="chip" onclick="useStarter(this)">📊 Summarize my week</button>
        </div>
      </div>
      <div class="date-line" id="date-line" style="display:none">Today</div>
    </div>
  </div>

  <!-- Input -->
  <div id="input-area">
    <div class="input-wrap">
      <div class="input-shell">
        <textarea
          id="inp"
          rows="1"
          placeholder="Ask ARIA to plan, track, or follow up…"
          autocomplete="off"
          spellcheck="true"
        ></textarea>
        <button id="send" disabled>
          <!-- Up arrow -->
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 13V3M3 8l5-5 5 5"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
    </div>
  </div>

</div>

<script>
(function () {
  const API     = 'http://188.245.242.236:4000';
  const USER_ID = 'demo-user-1';

  const $feed   = document.getElementById('feed');
  const $msgs   = document.getElementById('messages');
  const $inp    = document.getElementById('inp');
  const $send   = document.getElementById('send');
  const $pip    = document.getElementById('pip');
  const $stxt   = document.getElementById('status-text');
  const $welcome= document.getElementById('welcome');
  const $dateln = document.getElementById('date-line');

  marked.setOptions({ breaks: true, gfm: true });

  let busy = false;
  let started = false;

  /* ── Auto-grow textarea ── */
  $inp.addEventListener('input', () => {
    $inp.style.height = 'auto';
    $inp.style.height = Math.min($inp.scrollHeight, 160) + 'px';
    $send.disabled = !$inp.value.trim() || busy;
  });

  $inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!$send.disabled) submit();
    }
  });

  $send.addEventListener('click', submit);

  /* ── Starter chips ── */
  window.useStarter = function(btn) {
    $inp.value = btn.textContent.replace(/^[\p{Emoji}\s]+/u, '').trim();
    $inp.dispatchEvent(new Event('input'));
    $inp.focus();
  };

  /* ── Add a message row ── */
  function addMsg(role, content) {
    ensureStarted();

    const msg = document.createElement('div');
    msg.className = 'msg ' + role;

    if (role === 'user') {
      const bub = document.createElement('div');
      bub.className = 'user-bub';
      bub.textContent = content;
      msg.appendChild(bub);

    } else {
      const av = document.createElement('div');
      av.className = 'aria-av';
      av.innerHTML = `<svg width="16" height="16" viewBox="0 0 20 20" fill="none">
        <path d="M10 2L17.5 17H2.5L10 2Z" fill="white" fill-opacity="0.92"/>
        <path d="M7 13h6" stroke="rgba(255,255,255,0.55)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>`;

      const body = document.createElement('div');
      body.className = 'aria-body';

      const name = document.createElement('div');
      name.className = 'aria-name';
      name.textContent = 'ARIA';

      const prose = document.createElement('div');
      prose.className = 'prose';
      prose.innerHTML = marked.parse(content);

      body.appendChild(name);
      body.appendChild(prose);
      msg.appendChild(av);
      msg.appendChild(body);
    }

    $feed.appendChild(msg);
    scrollBottom();
    return msg;
  }

  /* ── Typing indicator ── */
  function addTyping() {
    ensureStarted();
    const msg = document.createElement('div');
    msg.className = 'msg aria';
    msg.id = 'typing';

    const av = document.createElement('div');
    av.className = 'aria-av';
    av.innerHTML = `<svg width="16" height="16" viewBox="0 0 20 20" fill="none">
      <path d="M10 2L17.5 17H2.5L10 2Z" fill="white" fill-opacity="0.92"/>
      <path d="M7 13h6" stroke="rgba(255,255,255,0.55)" stroke-width="1.5" stroke-linecap="round"/>
    </svg>`;

    const body = document.createElement('div');
    body.className = 'aria-body';

    const name = document.createElement('div');
    name.className = 'aria-name';
    name.textContent = 'ARIA';

    const row = document.createElement('div');
    row.className = 'typing-row';
    row.innerHTML = `
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <span class="typing-label">ARIA is thinking…</span>`;

    body.appendChild(name);
    body.appendChild(row);
    msg.appendChild(av);
    msg.appendChild(body);
    $feed.appendChild(msg);
    scrollBottom();
  }

  function removeTyping() {
    document.getElementById('typing')?.remove();
  }

  /* ── Status ── */
  function setStatus(thinking) {
    if (thinking) {
      $pip.className = 'h-pip thinking';
      $stxt.textContent = 'Thinking…';
    } else {
      $pip.className = 'h-pip';
      $stxt.textContent = 'Ready';
    }
  }

  /* ── Show conversation for first message ── */
  function ensureStarted() {
    if (started) return;
    started = true;
    $welcome.style.display = 'none';
    $dateln.style.display  = '';
  }

  function scrollBottom() {
    requestAnimationFrame(() => {
      $msgs.scrollTop = $msgs.scrollHeight;
    });
  }

  /* ── Submit ── */
  async function submit() {
    const text = $inp.value.trim();
    if (!text || busy) return;

    busy = true;
    $send.disabled = true;
    $inp.value = '';
    $inp.style.height = 'auto';

    addMsg('user', text);
    addTyping();
    setStatus(true);

    try {
      const res = await fetch(`${API}/api/aria/chat`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ userId: USER_ID, message: text }),
      });

      removeTyping();

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { reply } = await res.json();
      addMsg('aria', reply || "I've noted that down.");

    } catch (err) {
      removeTyping();
      addMsg('aria', `_Unable to reach ARIA — ${err.message}_`);
    } finally {
      busy = false;
      setStatus(false);
      $inp.focus();
    }
  }

  /* ── Clear ── */
  window.clearChat = function () {
    started = false;
    $feed.innerHTML = '';
    $feed.appendChild($welcome);
    $welcome.style.display = '';
    const dl = document.createElement('div');
    dl.className = 'date-line';
    dl.id = 'date-line';
    dl.textContent = 'Today';
    dl.style.display = 'none';
    $feed.appendChild(dl);
  };

  /* ── Focus input on load ── */
  setTimeout(() => $inp.focus(), 200);

})();
</script>
</body>
</html>
