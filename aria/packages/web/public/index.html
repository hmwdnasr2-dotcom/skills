<style>

  }

    background: rgba(45,52,73,0.4);

  .prose-dark { color: #dae2fd; line-height: 1.7; }

  .prose-dark h1,.prose-dark h2,.prose-dark h3 {
    font-family: Manrope,sans-serif; font-weight: 700;
    color: #fff; margin: 16px 0 8px;
  }
  .prose-dark h2 { font-size: 18px; }

    <a class="flex items-center space-x-md px-md py-sm rounded-lg text-slate-400 hover:text-slate-200 hover:bg-slate-800/40 transition-all duration-200" href="#">

      <span class="text-sm font-medium">Knowledge Base</span>
    </a>
    <a class="flex items-center space-x-md px-md py-sm rounded-lg text-slate-400 hover:text-slate-200 hover:bg-slate-800/40 transition-all duration-200" href="/dashboard.html">

<!-- Main -->
<main class="main-offset ml-64 h-screen flex flex-col relative bg-surface overflow-hidden">

  <!-- Header -->

    <div class="flex items-center gap-sm">
      <span class="material-symbols-outlined text-slate-400" style="font-size:20px">search</span>

    <div class="absolute left-1/2 -translate-x-1/2">

    </div>
    <div class="flex items-center space-x-md">

  </header>

  <!-- Welcome state -->

    <div class="text-center space-y-md">
      <div class="inline-flex items-center px-md py-xs rounded-full bg-indigo-500/10 border border-indigo-500/20 mb-md">

      <p class="text-on-surface-variant text-lg max-w-md mx-auto">How can I help you today?</p>
    </div>

    <div class="grid grid-cols-2 gap-gutter w-full max-w-2xl px-xl">
      <button onclick="useAction('Analyze the following and give me key insights: ')" class="glass-card p-xl rounded-xl flex flex-col items-start text-left group hover:bg-slate-800/40 hover:border-indigo-500/30 transition-all duration-300">
        <div class="w-12 h-12 rounded-lg bg-indigo-500/10 flex items-center justify-center text-indigo-400 mb-md group-hover:scale-110 transition-transform">
          <span class="material-symbols-outlined text-2xl">query_stats</span>
        </div>
        <h3 class="text-base font-bold text-on-background mb-xs">Analyze</h3>
        <p class="text-sm text-slate-500">Deep-dive insights on any topic or data.</p>
      </button>

      <button onclick="useAction('Summarize this concisely: ')" class="glass-card p-xl rounded-xl flex flex-col items-start text-left group hover:bg-slate-800/40 hover:border-blue-500/30 transition-all duration-300">
        <div class="w-12 h-12 rounded-lg bg-blue-500/10 flex items-center justify-center text-blue-400 mb-md group-hover:scale-110 transition-transform">
          <span class="material-symbols-outlined text-2xl">summarize</span>
        </div>
        <h3 class="text-base font-bold text-on-background mb-xs">Summarize</h3>
        <p class="text-sm text-slate-500">Condense content into key insights.</p>
      </button>

      <button onclick="useAction('Create a detailed step-by-step plan for: ')" class="glass-card p-xl rounded-xl flex flex-col items-start text-left group hover:bg-slate-800/40 hover:border-tertiary/30 transition-all duration-300">
        <div class="w-12 h-12 rounded-lg bg-tertiary/10 flex items-center justify-center text-tertiary mb-md group-hover:scale-110 transition-transform">
          <span class="material-symbols-outlined text-2xl">architecture</span>
        </div>
        <h3 class="text-base font-bold text-on-background mb-xs">Build Plan</h3>

        <p class="text-sm text-slate-500">Fetch consolidated operational metrics.</p>
      </button>

  <!-- Message feed (hidden until first message) -->
  <div id="msg-feed" class="hidden flex-1 overflow-y-auto py-xl px-gutter">
    <div id="msg-list" class="max-w-3xl mx-auto space-y-lg pb-4"></div>
    <div id="feed-bottom"></div>

  <!-- Input area -->

        <button class="p-md text-slate-400 hover:text-indigo-400 transition-colors" title="Attach file (coming soon)" disabled>

          id="inp"
          type="text"
          class="flex-1 bg-transparent border-none text-on-background placeholder:text-slate-500 focus:ring-0 py-md text-body-md outline-none"
          placeholder="Message ARIA…"
          autocomplete="off"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submit();}"
          oninput="document.getElementById('send-btn').disabled=!this.value.trim()||busy;"
        />
        <div class="flex items-center space-x-sm px-sm">
          <button id="send-btn" onclick="submit()" disabled
            class="bg-indigo-500 text-white w-10 h-10 rounded-lg flex items-center justify-center hover:bg-indigo-400 active:scale-90 transition-all disabled:opacity-30 disabled:cursor-default">
            <span class="material-symbols-outlined" style="font-size:20px">send</span>

<!-- ARIA active indicator -->
<div class="fixed bottom-margin right-8 z-50">
  <div class="bg-slate-900/90 backdrop-blur-xl border border-indigo-500/20 px-md py-sm rounded-full flex items-center space-x-md shadow-2xl">
    <div class="relative flex items-center justify-center">
      <span id="pulse-ring" class="absolute w-2.5 h-2.5 bg-indigo-500 rounded-full opacity-0"></span>
      <span class="relative w-2 h-2 bg-slate-600 rounded-full" id="node-dot"></span>
    </div>
    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider" id="node-label">Connecting…</span>
  </div>
</div>

<script>
(function () {
  'use strict';

  const API = '';
  const UID = 'user-1';

  window.doLogout = function() {
    localStorage.removeItem('aria_auth');
    window.location.replace('/login.html');
  };

  let busy = false;
  let msgCount = 0;

  const $welcome  = document.getElementById('welcome-state');
  const $feed     = document.getElementById('msg-feed');
  const $list     = document.getElementById('msg-list');
  const $bottom   = document.getElementById('feed-bottom');
  const $inp      = document.getElementById('inp');
  const $sendBtn  = document.getElementById('send-btn');
  const $pip      = document.getElementById('status-pip');
  const $nodeDot  = document.getElementById('node-dot');
  const $nodeLabel= document.getElementById('node-label');
  const $pulseRing= document.getElementById('pulse-ring');

  /* ── Scroll ── */
  function scroll() {
    requestAnimationFrame(() => $bottom.scrollIntoView({ behavior: 'smooth', block: 'end' }));
  }

  /* ── Transition to chat view ── */
  function showFeed() {
    if (!$feed.classList.contains('hidden')) return;
    $welcome.style.display = 'none';
    $feed.classList.remove('hidden');
    $feed.classList.add('flex', 'flex-col');
  }

  /* ── Append message ── */
  function addMessage(role, content, id) {
    showFeed();
    msgCount++;
    const msgId = id || ('msg-' + msgCount);

    const wrap = document.createElement('div');
    wrap.id = msgId;
    wrap.className = 'msg-in';

    if (role === 'user') {
      wrap.innerHTML = `
        <div class="flex justify-end">
          <div class="max-w-[72%] bg-surface-container-high border border-slate-700/50 rounded-2xl rounded-tr-sm px-4 py-3 text-on-background text-sm leading-relaxed">
            ${escHtml(content)}
          </div>
        </div>`;
    } else if (role === 'aria') {
      wrap.innerHTML = `
        <div class="flex items-start gap-3">
          <div class="w-8 h-8 rounded-lg bg-indigo-500/20 border border-indigo-500/30 flex items-center justify-center flex-shrink-0 mt-0.5">
            <span class="material-symbols-outlined text-indigo-400" style="font-size:16px">hub</span>
          </div>
          <div class="flex-1 min-w-0">
            <div class="text-[10px] font-bold uppercase tracking-widest text-indigo-400 mb-1">ARIA</div>
            <div class="prose-dark text-sm" id="${msgId}-body">${content === '…' ? '<span class="cursor-blink">▌</span>' : renderMd(content)}</div>
          </div>
        </div>`;
    } else {
      wrap.innerHTML = `<div class="text-center text-xs text-slate-500 italic py-1">${escHtml(content)}</div>`;
    }

    $list.appendChild(wrap);
    scroll();
    return msgId;
  }

  function updateMessage(id, content) {
    const body = document.getElementById(id + '-body');
    if (body) body.innerHTML = renderMd(content);
    scroll();
  }

  /* ── Markdown ── */
  function renderMd(text) {
    if (typeof marked !== 'undefined') {
      try { return marked.parse(text); } catch(e) {}
    }
    return escHtml(text).replace(/\n/g, '<br>');
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Submit ── */
  window.submit = async function() {
    const text = $inp.value.trim();
    if (!text || busy) return;

    busy = true;
    $sendBtn.disabled = true;
    $inp.value = '';
    $inp.disabled = true;

    addMessage('user', text);
    const pendingId = addMessage('aria', '…');
    setPulsing(true);

    try {
      const res = await fetch(`${API}/api/aria/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: UID, message: text })
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const { reply, downloads } = await res.json();
      updateMessage(pendingId, reply || "I've noted that down.");

      if (downloads && downloads.length) {
        const dlWrap = document.createElement('div');
        dlWrap.className = 'flex flex-wrap gap-2 mt-3';
        downloads.forEach(dl => {
          const icon = dl.type === 'xlsx' ? 'table_chart' : dl.type === 'pdf' ? 'picture_as_pdf' : 'slideshow';
          dlWrap.innerHTML += `
            <a href="${dl.url}" download="${escHtml(dl.fileName)}"
               class="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg bg-indigo-500/10 border border-indigo-500/30 text-indigo-400 text-xs font-medium hover:bg-indigo-500/20 transition-colors">
              <span class="material-symbols-outlined" style="font-size:15px">${icon}</span>
              ${escHtml(dl.fileName)}
            </a>`;
        });
        const body = document.getElementById(pendingId + '-body');
        if (body) body.appendChild(dlWrap);
      }
    } catch (err) {
      updateMessage(pendingId, '⚠️ ' + err.message + ' — check server connection.');
    } finally {
      busy = false;
      $inp.disabled = false;
      $sendBtn.disabled = !$inp.value.trim();
      $inp.focus();
      setPulsing(false);
    }
  };

  /* ── Action cards ── */
  window.useAction = function(prompt) {
    $inp.value = prompt;
    $inp.focus();
    $sendBtn.disabled = false;
  };

  /* ── Clear chat ── */
  window.clearChat = function() {
    msgCount = 0;
    $list.innerHTML = '';
    $feed.classList.add('hidden');
    $feed.classList.remove('flex', 'flex-col');
    $welcome.style.display = '';
    $inp.value = '';
    $sendBtn.disabled = true;
  };

  /* ── Status indicator ── */
  function setOnline(online) {
    $pip.className = `w-2 h-2 rounded-full ${online ? 'bg-green-500' : 'bg-red-500'}`;
    $nodeDot.className = `relative w-2 h-2 rounded-full ${online ? 'bg-green-500' : 'bg-red-500'}`;
    $nodeLabel.textContent = online ? 'ARIA · Active' : 'ARIA · Offline';
  }

  function setPulsing(on) {
    $pulseRing.style.opacity = on ? '0.75' : '0';
    $pulseRing.style.animation = on ? 'ping 1s cubic-bezier(0,0,0.2,1) infinite' : 'none';
    $pulseRing.className = `absolute w-2.5 h-2.5 rounded-full ${on ? 'bg-indigo-500' : 'bg-green-500'}`;
  }

  /* ── Health check ── */
  fetch(`${API}/health`)
    .then(r => setOnline(r.ok))
    .catch(() => setOnline(false));

  /* ── SSE ── */
  function connectSSE() {
    const es = new EventSource(`${API}/api/aria/events?userId=${encodeURIComponent(UID)}`);
    es.onopen = () => setOnline(true);
    es.onmessage = e => {
      try {
        const { content } = JSON.parse(e.data);
        if (content) addMessage('aria', content);
      } catch (_) {}
    };
    es.onerror = () => {
      es.close();
      setOnline(false);
      setTimeout(connectSSE, 6000);
    };
  }

  connectSSE();
  $inp.focus();
})();
</script>
