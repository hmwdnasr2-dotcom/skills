<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f4ed">
<title>ARIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Design tokens — Claude / Anthropic spec ── */
:root {
  /* Backgrounds */
  --parchment:   #f5f4ed;
  --ivory:       #faf9f5;
  --warm-sand:   #e8e6dc;
  --white:       #ffffff;

  /* Dark surfaces */
  --near-black:  #141413;
  --dark-surface:#30302e;

  /* Text */
  --tx:          #141413;
  --tx-olive:    #5e5d59;
  --tx-stone:    #87867f;
  --tx-charcoal: #4d4c48;
  --tx-silver:   #b0aea5;

  /* Brand */
  --terracotta:  #c96442;
  --coral:       #d97757;

  /* Borders & rings */
  --border-cream:#f0eee6;
  --border-warm: #e8e6dc;
  --ring-warm:   #d1cfc5;
  --ring-deep:   #c2c0b6;

  /* Functional */
  --focus-blue:  #3898ec;
  --online:      #3d9e6e;

  /* Typography */
  --serif: 'Lora', Georgia, serif;
  --sans:  'Inter', system-ui, -apple-system, sans-serif;
  --mono:  'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}

/* ── Base ── */
html, body {
  height: 100%;
  background: var(--parchment);
  color: var(--tx);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── App shell ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  height: 100vh;
}

/* ════════════════════════════════════════
   HEADER
════════════════════════════════════════ */
header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  height: 56px;
  padding-top: env(safe-area-inset-top);
  background: var(--ivory);
  border-bottom: 1px solid var(--border-cream);
}

.h-brand {
  display: flex;
  align-items: center;
  gap: 11px;
}

/* Terracotta logo mark */
.logo {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: var(--terracotta);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 0 1px var(--terracotta);
}
.logo-letter {
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 500;
  color: var(--ivory);
  line-height: 1;
  margin-top: 1px;
}

.h-name {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 500;
  color: var(--tx);
  letter-spacing: -0.2px;
  line-height: 1;
}

.h-status {
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 400;
  color: var(--tx-stone);
  letter-spacing: 0.1px;
}
.h-pip {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--online);
  flex-shrink: 0;
}
.h-pip.thinking {
  background: var(--terracotta);
  animation: pip-blink 0.85s ease-in-out infinite;
}
@keyframes pip-blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.h-btn {
  height: 30px;
  padding: 0 12px;
  border-radius: 8px;
  border: none;
  background: var(--warm-sand);
  color: var(--tx-charcoal);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  box-shadow: 0 0 0 1px var(--ring-warm);
  transition: box-shadow 0.15s ease, background 0.15s ease;
}
.h-btn:hover {
  background: var(--border-warm);
  box-shadow: 0 0 0 1px var(--ring-deep);
}

/* ════════════════════════════════════════
   MESSAGES
════════════════════════════════════════ */
#messages {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  scroll-behavior: smooth;
  background: var(--parchment);
}
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb {
  background: var(--ring-warm);
  border-radius: 2px;
}

/* Content column — centered, 700px max */
.feed {
  max-width: 700px;
  margin: 0 auto;
  padding: 0 28px 24px;
}

/* ── Welcome state ── */
.welcome {
  padding: 52px 0 40px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 14px;
}
.welcome-title {
  font-family: var(--serif);
  font-size: 32px;
  font-weight: 500;
  color: var(--tx);
  line-height: 1.2;
  letter-spacing: -0.3px;
}
.welcome-sub {
  font-family: var(--sans);
  font-size: 16px;
  font-weight: 400;
  color: var(--tx-olive);
  line-height: 1.6;
  max-width: 440px;
}
.starters {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 6px;
}
.starter {
  padding: 8px 16px;
  border-radius: 20px;
  border: none;
  background: var(--ivory);
  box-shadow: 0 0 0 1px var(--border-warm);
  color: var(--tx-olive);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 400;
  cursor: pointer;
  transition: box-shadow 0.15s ease, color 0.15s ease, background 0.15s ease;
  text-align: left;
}
.starter:hover {
  box-shadow: 0 0 0 1px var(--ring-warm);
  background: var(--warm-sand);
  color: var(--tx);
}

/* ── Date separator ── */
.date-sep {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 28px 0 20px;
  color: var(--tx-stone);
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.date-sep::before, .date-sep::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-cream);
}

/* ── Message block ── */
.msg {
  padding: 16px 0;
  animation: msg-appear 0.2s ease both;
}
.msg + .msg {
  border-top: 1px solid var(--border-cream);
}

@keyframes msg-appear {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── ARIA message — no bubble, avatar + prose ── */
.msg.aria-msg {
  display: flex;
  align-items: flex-start;
  gap: 14px;
}

.aria-av {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  background: var(--terracotta);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
  box-shadow: 0 0 0 1px var(--terracotta);
}
.aria-av-letter {
  font-family: var(--serif);
  font-size: 13px;
  font-weight: 500;
  color: var(--ivory);
  line-height: 1;
}

.aria-content {
  flex: 1;
  min-width: 0;
}

/* "ARIA" overline label */
.aria-label {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--tx-stone);
  margin-bottom: 6px;
}

/* ── Lora prose body ── */
.prose {
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 400;
  line-height: 1.75;
  color: var(--tx);
  word-break: break-word;
}

.prose p { margin: 0 0 12px; }
.prose p:last-child { margin-bottom: 0; }

.prose strong {
  font-weight: 600;
  color: var(--tx);
  font-family: var(--sans);
}
.prose em { font-style: italic; color: var(--tx-olive); }

.prose h1, .prose h2, .prose h3 {
  font-family: var(--serif);
  font-weight: 500;
  line-height: 1.3;
  color: var(--tx);
  margin: 20px 0 8px;
}
.prose h1 { font-size: 22px; }
.prose h2 { font-size: 19px; }
.prose h3 { font-size: 17px; }
.prose h1:first-child,
.prose h2:first-child,
.prose h3:first-child { margin-top: 0; }

.prose ul, .prose ol {
  padding-left: 22px;
  margin: 8px 0 12px;
}
.prose li {
  margin: 7px 0;
  line-height: 1.7;
  color: var(--tx);
}
.prose li::marker { color: var(--terracotta); }

.prose code {
  font-family: var(--mono);
  font-size: 13.5px;
  background: var(--warm-sand);
  border: 1px solid var(--border-warm);
  border-radius: 5px;
  padding: 1px 6px;
  color: var(--dark-surface);
}
.prose pre {
  background: var(--near-black);
  border-radius: 10px;
  padding: 16px 18px;
  overflow-x: auto;
  margin: 14px 0;
  box-shadow: 0 0 0 1px var(--dark-surface);
}
.prose pre code {
  background: none;
  border: none;
  padding: 0;
  color: #e8d5c4;
  font-size: 13.5px;
  line-height: 1.65;
}
.prose blockquote {
  border-left: 3px solid var(--terracotta);
  padding-left: 16px;
  margin: 14px 0;
  color: var(--tx-olive);
  font-style: italic;
}
.prose hr {
  border: none;
  border-top: 1px solid var(--border-warm);
  margin: 18px 0;
}
.prose a {
  color: var(--terracotta);
  text-decoration: underline;
  text-underline-offset: 3px;
}
.prose table {
  border-collapse: collapse;
  width: 100%;
  margin: 14px 0;
  font-family: var(--sans);
  font-size: 14px;
}
.prose th {
  background: var(--warm-sand);
  padding: 8px 14px;
  text-align: left;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  color: var(--tx-charcoal);
  border-bottom: 1px solid var(--border-warm);
}
.prose td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border-cream);
  color: var(--tx-olive);
}

/* ── Typing cursor ── */
.type-cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--terracotta);
  border-radius: 1px;
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: cursor-blink 0.9s step-end infinite;
}
@keyframes cursor-blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0; }
}

/* ── Thinking dots ── */
.thinking {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 0;
}
.thinking-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--ring-warm);
  animation: dot-rise 1.3s ease-in-out infinite;
}
.thinking-dot:nth-child(2) { animation-delay: 0.15s; }
.thinking-dot:nth-child(3) { animation-delay: 0.30s; }
@keyframes dot-rise {
  0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
  30%            { opacity: 1;   transform: translateY(-4px); }
}

/* ── User message — Warm Sand bubble ── */
.msg.user-msg {
  display: flex;
  justify-content: flex-end;
}

.user-bubble {
  max-width: min(72%, 500px);
  background: var(--warm-sand);
  border-radius: 18px 18px 4px 18px;
  padding: 13px 18px;
  box-shadow: 0 0 0 1px var(--ring-warm);
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 400;
  line-height: 1.65;
  color: var(--tx);
  word-break: break-word;
}

/* ════════════════════════════════════════
   INPUT AREA
════════════════════════════════════════ */
#input-area {
  flex-shrink: 0;
  padding: 16px 28px;
  padding-bottom: max(20px, env(safe-area-inset-bottom));
  background: var(--ivory);
  border-top: 1px solid var(--border-cream);
}

.input-wrap {
  max-width: 700px;
  margin: 0 auto;
}

/* The pill-shaped input shell */
.input-shell {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--parchment);
  border-radius: 14px;
  padding: 12px 12px 12px 18px;
  box-shadow: 0 0 0 1.5px var(--border-warm);
  transition: box-shadow 0.2s ease;
}
.input-shell:focus-within {
  box-shadow: 0 0 0 2px var(--focus-blue);
}

textarea#inp {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--tx);
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 400;
  line-height: 1.55;
  resize: none;
  min-height: 24px;
  max-height: 160px;
  overflow-y: auto;
  caret-color: var(--terracotta);
}
textarea#inp::placeholder {
  color: var(--tx-stone);
}
textarea#inp::-webkit-scrollbar { width: 3px; }
textarea#inp::-webkit-scrollbar-thumb { background: var(--ring-warm); }

/* Send button — Terracotta brand */
#send-btn {
  width: 36px;
  height: 36px;
  border-radius: 9px;
  border: none;
  background: var(--terracotta);
  color: var(--ivory);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 0 1px var(--terracotta);
  transition: background 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease;
}
#send-btn:hover {
  background: var(--coral);
  box-shadow: 0 0 0 1px var(--coral);
}
#send-btn:active { transform: scale(0.93); }
#send-btn:disabled {
  background: var(--warm-sand);
  box-shadow: 0 0 0 1px var(--ring-warm);
  color: var(--tx-stone);
  cursor: not-allowed;
  transform: none;
}

.input-hint {
  margin-top: 9px;
  text-align: center;
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 400;
  color: var(--tx-stone);
  letter-spacing: 0.1px;
}

/* ── Responsive ── */
@media (max-width: 600px) {
  header     { padding: 0 16px; }
  .feed      { padding: 0 16px 20px; }
  #input-area{ padding: 12px 16px; padding-bottom: max(20px, env(safe-area-inset-bottom)); }
  .welcome-title { font-size: 26px; }
  .user-bubble { max-width: 88%; }
}
@media (min-width: 900px) {
  .feed       { padding: 0 48px 24px; }
  #input-area { padding: 18px 48px; padding-bottom: 24px; }
}
</style>
</head>
<body>
<div id="app">

  <!-- ── Header ── -->
  <header>
    <div class="h-brand">
      <div class="logo">
        <span class="logo-letter">A</span>
      </div>
      <span class="h-name">ARIA</span>
    </div>

    <div class="h-status">
      <div class="h-pip" id="pip"></div>
      <span id="status-txt">Ready</span>
    </div>

    <button class="h-btn" onclick="clearChat()">Clear</button>
  </header>

  <!-- ── Messages ── -->
  <div id="messages">
    <div class="feed" id="feed">

      <!-- Welcome state -->
      <div id="welcome" class="welcome">
        <div class="welcome-title">How can I help you today?</div>
        <div class="welcome-sub">
          I can help you plan tasks, track projects, follow up on work, and keep your week on track.
        </div>
        <div class="starters">
          <button class="starter" onclick="prefill(this)">📋 What's on my plate today?</button>
          <button class="starter" onclick="prefill(this)">🚀 Create a new project</button>
          <button class="starter" onclick="prefill(this)">⏰ What tasks are overdue?</button>
          <button class="starter" onclick="prefill(this)">📊 Summarize my week</button>
        </div>
      </div>

      <!-- Message feed (injected below) -->
      <div id="msg-list"></div>

    </div>
  </div>

  <!-- ── Input ── -->
  <div id="input-area">
    <div class="input-wrap">
      <div class="input-shell">
        <textarea
          id="inp"
          rows="1"
          placeholder="Ask ARIA to plan, track, or follow up…"
          autocomplete="off"
          spellcheck="true"
        ></textarea>
        <button id="send-btn" disabled>
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none"
               stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 13V3M3 8l5-5 5 5"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter to send · Shift + Enter for new line</div>
    </div>
  </div>

</div><!-- #app -->

<script>
(function () {
  'use strict';

  const API      = 'http://188.245.242.236:4000';
  const USER_ID  = 'user-1';
  const CHAR_MS  = 12; // typing speed: ms per character

  const $msgs    = document.getElementById('messages');
  const $list    = document.getElementById('msg-list');
  const $welcome = document.getElementById('welcome');
  const $inp     = document.getElementById('inp');
  const $btn     = document.getElementById('send-btn');
  const $pip     = document.getElementById('pip');
  const $stxt    = document.getElementById('status-txt');

  marked.setOptions({ breaks: true, gfm: true });

  let busy    = false;
  let started = false;

  /* ── Textarea: auto-grow ── */
  $inp.addEventListener('input', () => {
    $inp.style.height = 'auto';
    $inp.style.height = Math.min($inp.scrollHeight, 160) + 'px';
    $btn.disabled = !$inp.value.trim() || busy;
  });

  $inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!$btn.disabled) submit();
    }
  });

  $btn.addEventListener('click', submit);

  /* ── Starter chips ── */
  window.prefill = function (btn) {
    // Strip leading emoji + whitespace
    const text = btn.textContent.replace(/^[\p{Emoji_Presentation}\p{Extended_Pictographic}\s]+/u, '').trim();
    $inp.value = text;
    $inp.dispatchEvent(new Event('input'));
    $inp.focus();
  };

  /* ── Add user bubble ── */
  function addUser(text) {
    ensureStarted();
    const div = document.createElement('div');
    div.className = 'msg user-msg';
    div.innerHTML = `<div class="user-bubble"></div>`;
    div.querySelector('.user-bubble').textContent = text;
    $list.appendChild(div);
    scrollBottom();
  }

  /* ── Add ARIA row (returns the prose container) ── */
  function addAria() {
    ensureStarted();
    const div = document.createElement('div');
    div.className = 'msg aria-msg';
    div.innerHTML = `
      <div class="aria-av"><span class="aria-av-letter">A</span></div>
      <div class="aria-content">
        <div class="aria-label">ARIA</div>
        <div class="aria-body"></div>
      </div>`;
    $list.appendChild(div);
    scrollBottom();
    return div.querySelector('.aria-body');
  }

  /* ── Show thinking dots ── */
  function showThinking(body) {
    body.innerHTML = `
      <div class="thinking">
        <div class="thinking-dot"></div>
        <div class="thinking-dot"></div>
        <div class="thinking-dot"></div>
      </div>`;
    scrollBottom();
  }

  /* ── Letter-by-letter typing animation ── */
  async function typeReply(body, text) {
    body.innerHTML = ''; // clear thinking dots

    const container = document.createElement('div');
    container.className = 'prose';
    body.appendChild(container);

    // Blinking cursor
    const cursor = document.createElement('span');
    cursor.className = 'type-cursor';

    // Type each character
    for (const ch of text) {
      cursor.remove();
      if (ch === '\n') {
        container.appendChild(document.createElement('br'));
      } else {
        container.appendChild(document.createTextNode(ch));
      }
      container.appendChild(cursor);
      scrollBottom();
      await sleep(CHAR_MS);
    }

    // Done — remove cursor, render full markdown
    cursor.remove();
    container.innerHTML = marked.parse(text);
    scrollBottom();
  }

  /* ── Submit ── */
  async function submit() {
    const text = $inp.value.trim();
    if (!text || busy) return;

    busy = true;
    $btn.disabled = true;
    $inp.value = '';
    $inp.style.height = 'auto';

    addUser(text);
    const ariaBody = addAria();
    showThinking(ariaBody);
    setStatus(true);

    try {
      const res = await fetch(`${API}/api/aria/chat`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ userId: USER_ID, message: text }),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { reply } = await res.json();
      await typeReply(ariaBody, reply || "I've noted that down.");

    } catch (err) {
      await typeReply(ariaBody, `_Could not reach ARIA — ${err.message}_`);
    } finally {
      busy = false;
      setStatus(false);
      $inp.focus();
    }
  }

  /* ── Helpers ── */
  function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  function scrollBottom() {
    requestAnimationFrame(() => { $msgs.scrollTop = $msgs.scrollHeight; });
  }

  function setStatus(thinking) {
    $pip.className  = thinking ? 'h-pip thinking' : 'h-pip';
    $stxt.textContent = thinking ? 'Thinking…' : 'Ready';
  }

  function ensureStarted() {
    if (started) return;
    started = true;
    $welcome.style.display = 'none';

    const sep = document.createElement('div');
    sep.className = 'date-sep';
    sep.textContent = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
    $list.insertAdjacentElement('beforebegin', sep);
  }

  /* ── Clear conversation ── */
  window.clearChat = function () {
    started = false;
    $list.innerHTML = '';
    // Remove any date separators
    document.querySelectorAll('.date-sep').forEach(el => el.remove());
    $welcome.style.display = '';
  };

  /* ── Focus input on load ── */
  setTimeout(() => $inp.focus(), 150);

})();
</script>
</body>
</html>
