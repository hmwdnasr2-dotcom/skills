<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#020c18">
<title>ARIA — NEXUS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

:root {
  --bg:    #020c18;
  --bg2:   #040f1e;
  --cy:    #00d4ff;
  --cy2:   #00a8cc;
  --cy3:   rgba(0,212,255,0.12);
  --cy4:   rgba(0,212,255,0.04);
  --or:    #ff6b35;
  --or2:   rgba(255,107,53,0.15);
  --tx:    #b8e4f0;
  --tx2:   #4a7a8a;
  --tx3:   #1a3a4a;
  --line:  rgba(0,212,255,0.12);
  --line2: rgba(0,212,255,0.06);
  --f:     'Space Grotesk','Inter',system-ui,sans-serif;
  --fi:    'Inter',system-ui,sans-serif;
}

html, body {
  height:100%; overflow:hidden; background:var(--bg);
  color:var(--tx); font-family:var(--f); font-size:14px;
  line-height:1.55; -webkit-font-smoothing:antialiased;
}

/* ── Grid background ── */
body {
  background-image:
    linear-gradient(var(--line2) 1px, transparent 1px),
    linear-gradient(90deg, var(--line2) 1px, transparent 1px);
  background-size:50px 50px;
  background-color:var(--bg);
}

/* ── Ambient glow ── */
.glow-a,.glow-b {
  position:fixed; border-radius:50%; pointer-events:none;
  filter:blur(100px); z-index:0;
}
.glow-a { width:600px; height:400px; top:-150px; right:-100px; background:radial-gradient(ellipse,rgba(0,212,255,.12),transparent 70%); }
.glow-b { width:500px; height:400px; bottom:-100px; left:-100px; background:radial-gradient(ellipse,rgba(0,80,120,.15),transparent 70%); }

#app {
  position:relative; z-index:1;
  display:flex; flex-direction:column;
  height:100dvh; max-width:800px; margin:0 auto;
}

/* ── HUD Header ── */
header {
  flex-shrink:0; position:relative;
  padding:14px 22px 14px; padding-top:max(14px,env(safe-area-inset-top));
  background:rgba(2,12,24,.85);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);
}

/* HUD corner brackets */
header::before, header::after {
  content:''; position:absolute; width:14px; height:14px; border-color:var(--cy); border-style:solid; opacity:.5;
}
header::before { top:8px; left:8px; border-width:1px 0 0 1px; }
header::after  { top:8px; right:8px; border-width:1px 1px 0 0; }

.hud-top {
  display:flex; align-items:center; justify-content:space-between;
}

.hud-brand {
  display:flex; align-items:center; gap:14px;
}

.hud-icon {
  position:relative; width:36px; height:36px;
}
.hud-hex {
  position:absolute; inset:0;
  background:var(--cy3); border:1px solid rgba(0,212,255,.3);
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex; align-items:center; justify-content:center;
}
.hud-hex::after {
  content:''; position:absolute; inset:-6px;
  background:var(--cy3);
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  filter:blur(10px); z-index:-1;
}
.hud-letter { font-size:13px; font-weight:700; color:var(--cy); position:relative; z-index:1; }

.hud-titles { display:flex; flex-direction:column; gap:2px; }
.hud-name { font-size:16px; font-weight:700; color:#fff; letter-spacing:.5px; }
.hud-sub  { font-size:9.5px; font-weight:500; letter-spacing:2px; text-transform:uppercase; color:var(--cy2); opacity:.7; }

.hud-data { display:flex; align-items:center; gap:16px; }
.data-cell { display:flex; flex-direction:column; gap:2px; align-items:center; }
.data-label { font-size:8.5px; letter-spacing:1.2px; text-transform:uppercase; color:var(--tx3); }
.data-val   { font-size:12px; font-weight:600; color:var(--cy); font-family:'SF Mono',monospace; }
.data-val.or { color:var(--or); }
.data-val.green { color:#00ff88; }

.hud-sep { width:1px; height:28px; background:var(--line); }

.status-ring {
  width:30px; height:30px; border-radius:50%;
  border:1.5px solid rgba(0,212,255,.25);
  display:flex; align-items:center; justify-content:center;
  position:relative;
}
.status-ring::before {
  content:''; position:absolute; inset:-3px; border-radius:50%;
  border:1px solid rgba(0,212,255,.1);
}
.status-core {
  width:10px; height:10px; border-radius:50%;
  background:var(--cy); box-shadow:0 0 10px var(--cy);
}
.status-core.pulse { animation:sp .8s ease-in-out infinite; }
@keyframes sp { 0%,100%{box-shadow:0 0 10px var(--cy);opacity:1} 50%{box-shadow:0 0 20px var(--cy),0 0 40px rgba(0,212,255,.3);opacity:.7} }

.clr-btn {
  display:flex; align-items:center; gap:5px;
  padding:5px 12px; border-radius:3px;
  border:1px solid var(--line); background:var(--cy4);
  color:var(--tx2); font:500 10.5px/1 var(--f); cursor:pointer; letter-spacing:.5px;
  transition:.12s;
}
.clr-btn:hover { border-color:rgba(0,212,255,.25); color:var(--cy2); }

/* ── Messages ── */
#feed {
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding:20px 18px 12px; display:flex; flex-direction:column; gap:10px;
  scroll-behavior:smooth;
}
#feed::-webkit-scrollbar { width:2px; }
#feed::-webkit-scrollbar-thumb { background:rgba(0,212,255,.1); }

.row { display:flex; gap:10px; animation:ri .2s ease both; }
.row.you { flex-direction:row-reverse; }
@keyframes ri { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* angled message containers */
.bub-wrap { display:flex; flex-direction:column; max-width:min(80%,560px); }
.row.you .bub-wrap { align-items:flex-end; }
.row.aria .bub-wrap { align-items:flex-start; }

.bub-tag {
  font-size:9px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase;
  margin-bottom:5px; padding:0 2px; color:var(--tx3);
  display:flex; align-items:center; gap:6px;
}
.bub-tag::before { content:''; display:block; width:16px; height:1px; }
.row.aria .bub-tag::before { background:rgba(0,212,255,.3); }
.bub-tag::after  { content:''; display:block; width:8px; height:1px; }
.row.aria .bub-tag::after  { background:rgba(0,212,255,.15); }
.row.you .bub-tag { color:rgba(255,107,53,.4); }
.row.you .bub-tag::before { background:rgba(255,107,53,.3); }
.row.you .bub-tag::after  { background:rgba(255,107,53,.15); }

.bub {
  padding:11px 16px 12px; font-size:13.5px; line-height:1.65; word-break:break-word;
  position:relative; border-radius:2px;
}

.row.aria .bub {
  background:rgba(0,212,255,.04);
  border:1px solid rgba(0,212,255,.12);
  border-left:2px solid rgba(0,212,255,.35);
  color:var(--tx);
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);
}
.row.aria .bub::before {
  content:''; position:absolute; top:0; right:0;
  width:10px; height:10px;
  border-top:1px solid rgba(0,212,255,.3);
  border-right:1px solid rgba(0,212,255,.3);
}

.row.you .bub {
  background:rgba(255,107,53,.1);
  border:1px solid rgba(255,107,53,.2);
  border-right:2px solid rgba(255,107,53,.5);
  color:#ffd0b8;
  clip-path:polygon(10px 0,100% 0,100% 100%,0 100%,0 10px);
}
.row.you .bub::before {
  content:''; position:absolute; top:0; left:0;
  width:10px; height:10px;
  border-top:1px solid rgba(255,107,53,.3);
  border-left:1px solid rgba(255,107,53,.3);
}

/* side accent line */
.side-line {
  flex-shrink:0; width:2px; align-self:stretch;
  margin:4px 0;
}
.row.aria .side-line { background:linear-gradient(to bottom,var(--cy),transparent); opacity:.35; }
.row.you  .side-line { background:linear-gradient(to bottom,var(--or),transparent); opacity:.35; }

/* markdown */
.bub p{margin:0 0 7px} .bub p:last-child{margin:0}
.bub strong{font-weight:600;color:#e0f4ff}
.bub em{color:var(--tx2);font-style:italic}
.bub ul,.bub ol{padding-left:18px;margin:5px 0}
.bub li{margin:2px 0}
.bub li::marker{color:var(--cy2)}
.bub h1,.bub h2,.bub h3{font-weight:600;margin:10px 0 5px;color:var(--cy);font-family:var(--f)}
.bub h1{font-size:16px} .bub h2{font-size:14.5px} .bub h3{font-size:13.5px}
.bub code{font:12px/1 'SF Mono',monospace;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.15);border-radius:2px;padding:1px 5px;color:var(--cy)}
.bub pre{background:rgba(0,0,0,.5);border:1px solid rgba(0,212,255,.1);border-left:2px solid rgba(0,212,255,.25);border-radius:0;padding:11px 14px;overflow-x:auto;margin:8px 0}
.bub pre code{background:none;border:none;padding:0;color:#7dd3fc}
.bub blockquote{border-left:2px solid var(--cy2);padding-left:10px;margin:6px 0;color:var(--tx2);font-style:italic}
.bub a{color:var(--cy);text-underline-offset:2px}
.bub hr{border:none;border-top:1px solid var(--line);margin:9px 0}

/* ── Typing ── */
.typing-bub {
  background:rgba(0,212,255,.04); border:1px solid rgba(0,212,255,.12);
  border-left:2px solid rgba(0,212,255,.35);
  padding:12px 15px; border-radius:2px;
  display:inline-flex; align-items:center; gap:3px;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);
}
.td { width:5px; height:5px; border-radius:50%; background:var(--cy); opacity:.2; animation:td 1.3s ease-in-out infinite; }
.td:nth-child(2){animation-delay:.18s} .td:nth-child(3){animation-delay:.36s}
@keyframes td { 0%,60%,100%{opacity:.15;transform:scale(1)} 30%{opacity:1;transform:scale(1.5)} }

/* ── Divider ── */
.dvd {
  display:flex; align-items:center; gap:10px;
  color:var(--tx3); font-size:9.5px; font-weight:600;
  letter-spacing:1.5px; text-transform:uppercase; margin:8px 0;
  font-family:'SF Mono',monospace;
}
.dvd::before,.dvd::after { content:''; flex:1; height:1px; background:var(--line); }

/* ── Input ── */
.inp-zone {
  flex-shrink:0; padding:12px 18px;
  padding-bottom:max(14px,env(safe-area-inset-bottom));
  background:rgba(2,12,24,.9);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--line);
  position:relative;
}
.inp-zone::before,.inp-zone::after {
  content:''; position:absolute; width:12px; height:12px;
  border-color:var(--cy); border-style:solid; opacity:.3;
}
.inp-zone::before { bottom:8px; left:8px; border-width:0 0 1px 1px; }
.inp-zone::after  { bottom:8px; right:8px; border-width:0 1px 1px 0; }

.inp-frame {
  display:flex; align-items:flex-end; gap:10px;
  background:rgba(0,212,255,.04);
  border:1px solid rgba(0,212,255,.12); border-radius:2px;
  padding:10px 10px 10px 16px;
  transition:border-color .15s, box-shadow .15s;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%);
}
.inp-frame:focus-within {
  border-color:rgba(0,212,255,.35);
  box-shadow:0 0 0 2px rgba(0,212,255,.08), 0 0 20px rgba(0,212,255,.05);
}

textarea {
  flex:1; background:none; border:none; outline:none;
  color:#d0eaf5; font:13.5px/1.55 var(--fi);
  resize:none; min-height:22px; max-height:130px; overflow-y:auto;
  caret-color:var(--cy);
}
textarea::placeholder { color:var(--tx3); font-style:italic; }

#sb {
  flex-shrink:0; height:34px; padding:0 16px;
  border:1px solid rgba(0,212,255,.3); border-radius:2px;
  background:rgba(0,212,255,.08); color:var(--cy);
  font:500 11px/1 var(--f); cursor:pointer; letter-spacing:.8px;
  transition:all .12s; text-transform:uppercase;
  margin-bottom:1px;
}
#sb:hover { background:rgba(0,212,255,.15); border-color:rgba(0,212,255,.5); box-shadow:0 0 14px rgba(0,212,255,.15); }
#sb:active { background:rgba(0,212,255,.22); }
#sb:disabled { opacity:.2; cursor:default; box-shadow:none; }

/* scan line on active */
#sb:not(:disabled) { animation:sb-glow 3s ease-in-out infinite; }
@keyframes sb-glow { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 10px rgba(0,212,255,.12)} }

@media(min-width:800px){
  #app{border-left:1px solid var(--line);border-right:1px solid var(--line)}
  #feed{padding:24px 24px 14px}
  .inp-zone{padding:12px 24px;padding-bottom:18px}
  header{padding:14px 24px}
}
</style>
</head>
<body>
<div class="glow-a"></div>
<div class="glow-b"></div>

<div id="app">
  <header>
    <div class="hud-top">
      <div class="hud-brand">
        <div class="hud-icon">
          <div class="hud-hex"><span class="hud-letter">A</span></div>
        </div>
        <div class="hud-titles">
          <div class="hud-name">ARIA</div>
          <div class="hud-sub">Nexus Interface</div>
        </div>
      </div>

      <div class="hud-data">
        <div class="data-cell">
          <div class="data-label">Status</div>
          <div class="data-val green" id="dstat">ACTIVE</div>
        </div>
        <div class="hud-sep"></div>
        <div class="data-cell">
          <div class="data-label">Session</div>
          <div class="data-val" id="dsess">——</div>
        </div>
        <div class="hud-sep"></div>
        <div class="status-ring">
          <div class="status-core pulse" id="score"></div>
        </div>
        <button class="clr-btn" onclick="clearChat()">
          <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 3h8M5 3V1.5h2V3M4.5 3l.4 7h2.2l.4-7"/></svg>
          Clear
        </button>
      </div>
    </div>
  </header>

  <div id="feed"><div class="dvd">— Session Start —</div></div>

  <div class="inp-zone">
    <div class="inp-frame">
      <textarea id="inp" rows="1" placeholder="Transmit query to ARIA…" autocomplete="off" spellcheck="true"></textarea>
      <button id="sb" disabled>Send ↑</button>
    </div>
  </div>
</div>

<script>
(function(){
  const API='http://188.245.242.236:4000', UID='demo-user-1';
  const $f=document.getElementById('feed'), $i=document.getElementById('inp'),
        $b=document.getElementById('sb'), $ds=document.getElementById('dstat'),
        $dc=document.getElementById('dsess'), $sc=document.getElementById('score');
  marked.setOptions({breaks:true,gfm:true});
  let busy=false, msgCount=0;

  // Session ID
  document.getElementById('dsess').textContent=Math.random().toString(36).slice(2,7).toUpperCase();

  $i.addEventListener('input',()=>{ $i.style.height='auto'; $i.style.height=Math.min($i.scrollHeight,130)+'px'; $b.disabled=!$i.value.trim()||busy; });
  $i.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!$b.disabled)go();} });
  $b.addEventListener('click',go);

  function addRow(role,txt){
    msgCount++;
    const row=document.createElement('div'); row.className='row '+role;

    const sl=document.createElement('div'); sl.className='side-line';
    const bw=document.createElement('div'); bw.className='bub-wrap';

    const tag=document.createElement('div'); tag.className='bub-tag';
    tag.textContent=role==='aria'?'ARIA NEXUS':'OPERATOR';

    const bub=document.createElement('div'); bub.className='bub';
    if(role==='aria') bub.innerHTML=marked.parse(txt); else bub.textContent=txt;

    bw.append(tag,bub);
    if(role==='aria') row.append(sl,bw); else row.append(bw,sl);
    $f.appendChild(row); tick();
  }

  function addTyping(){
    const row=document.createElement('div'); row.className='row aria'; row.id='ty';
    const sl=document.createElement('div'); sl.className='side-line';
    const bw=document.createElement('div'); bw.className='bub-wrap';
    const tag=document.createElement('div'); tag.className='bub-tag'; tag.textContent='ARIA NEXUS';
    const w=document.createElement('div'); w.className='typing-bub';
    w.innerHTML='<div class="td"></div><div class="td"></div><div class="td"></div>';
    bw.append(tag,w); row.append(sl,bw); $f.appendChild(row); tick();
  }

  function removeTyping(){ document.getElementById('ty')?.remove(); }
  function tick(){ requestAnimationFrame(()=>{ $f.scrollTop=$f.scrollHeight; }); }

  function setStatus(on){
    if(on){
      $ds.textContent='PROC'; $ds.className='data-val or';
      $sc.className='status-core';
    } else {
      $ds.textContent='ACTIVE'; $ds.className='data-val green';
      $sc.className='status-core pulse';
    }
  }

  async function go(){
    const txt=$i.value.trim(); if(!txt||busy)return;
    busy=true; $b.disabled=true; $i.value=''; $i.style.height='auto';
    addRow('you',txt); addTyping(); setStatus(true);
    try{
      const r=await fetch(`${API}/api/aria/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:UID,message:txt})});
      removeTyping();
      if(!r.ok)throw new Error('HTTP '+r.status);
      const{reply}=await r.json();
      addRow('aria',reply||"I've noted that down.");
    }catch(e){ removeTyping(); addRow('aria',`**Error:** ${e.message}`); }
    finally{ busy=false; setStatus(false); $i.focus(); }
  }

  window.clearChat=()=>{
    $f.innerHTML='<div class="dvd">— Session Reset —</div>';
    msgCount=0;
    addRow('aria','Nexus cleared. Systems nominal. What is your objective?');
  };

  addRow('aria','Nexus online. Neural pathways synchronized. What would you like to accomplish today?');
  setTimeout(()=>$i.focus(),300);
})();
</script>
</body>
</html>
