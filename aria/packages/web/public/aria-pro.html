<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#09070f">
<title>ARIA Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

html, body {
  height:100%; overflow:hidden;
  font-family:'Inter', system-ui, sans-serif;
  font-size:14px; line-height:1.6;
  -webkit-font-smoothing:antialiased;
  background:#09070f;
  color:#ede8ff;
}

/* ── Gradient blobs that show through glass ── */
.blob {
  position:fixed; border-radius:50%; pointer-events:none; z-index:0;
  filter:blur(90px);
}
.blob-1 { width:520px; height:520px; top:-160px; left:-120px; background:radial-gradient(circle,#5b21b6 0%,transparent 70%); opacity:.45; }
.blob-2 { width:420px; height:420px; bottom:-100px; right:-80px;  background:radial-gradient(circle,#db2777 0%,transparent 70%); opacity:.28; }
.blob-3 { width:300px; height:300px; top:40%;  left:55%; background:radial-gradient(circle,#1d4ed8 0%,transparent 70%); opacity:.20; }

#app {
  position:relative; z-index:1;
  display:flex; flex-direction:column;
  height:100dvh; max-width:760px; margin:0 auto;
}

/* ── Header ── */
header {
  flex-shrink:0; display:flex; align-items:center; justify-content:space-between;
  padding:0 24px; height:62px; padding-top:env(safe-area-inset-top);
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(32px) saturate(200%);
  -webkit-backdrop-filter:blur(32px) saturate(200%);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.brand { display:flex; align-items:center; gap:12px; }

.brand-glyph {
  position:relative; width:38px; height:38px;
}
.brand-glyph-core {
  position:absolute; inset:0; border-radius:12px;
  background:linear-gradient(135deg,#7c3aed,#db2777);
  display:flex; align-items:center; justify-content:center;
  font-size:15px; font-weight:700; color:#fff;
}
.brand-glyph-halo {
  position:absolute; inset:-5px; border-radius:16px;
  background:linear-gradient(135deg,#7c3aed,#db2777);
  filter:blur(14px); opacity:.4; z-index:-1;
}

.brand-text { display:flex; flex-direction:column; gap:1px; }
.brand-name { font-size:15px; font-weight:700; color:#fff; letter-spacing:-.2px; }
.brand-tag  { font-size:10px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:#9f7aea; }

.hdr-pills { display:flex; align-items:center; gap:8px; }
.pill {
  display:flex; align-items:center; gap:6px;
  padding:5px 12px; border-radius:20px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.09);
  font-size:11px; font-weight:500;
}
.pill-dot { width:5px; height:5px; border-radius:50%; background:#10b981; box-shadow:0 0 6px #10b981; flex-shrink:0; }
.pill-dot.pulsing { background:#9f7aea; box-shadow:0 0 6px #9f7aea; animation:pd .75s ease-in-out infinite; }
@keyframes pd { 0%,100%{opacity:1}50%{opacity:.15} }
.pill-label { color:#a0a0b8; }

.clear-pill {
  padding:5px 12px; border-radius:20px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  font:500 11px/1 'Inter',sans-serif; color:#6b6880;
  cursor:pointer; transition:.15s;
}
.clear-pill:hover { background:rgba(255,255,255,0.07); color:#a0a0b8; }

/* ── Feed ── */
#feed {
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding:28px 20px 14px; display:flex; flex-direction:column; gap:8px;
  scroll-behavior:smooth;
}
#feed::-webkit-scrollbar { width:2px; }
#feed::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.07); }

.row { display:flex; flex-direction:column; animation:ri .2s cubic-bezier(.2,1.2,.4,1) both; }
.row.you { align-items:flex-end; }
.row.aria { align-items:flex-start; }
@keyframes ri { from{opacity:0;transform:scale(.96) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }

.row-label {
  font-size:9.5px; font-weight:700; letter-spacing:.9px;
  text-transform:uppercase; margin-bottom:5px; padding:0 3px;
  color:rgba(255,255,255,.2);
}
.row.you .row-label { color:rgba(192,132,252,.35); }

.bub {
  max-width:min(80%,560px);
  padding:11px 15px 12px; border-radius:18px;
  font-size:13.5px; line-height:1.65; word-break:break-word;
}

.row.aria .bub {
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.09);
  border-bottom-left-radius:4px;
  box-shadow:0 4px 24px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.06);
}

.row.you .bub {
  background:linear-gradient(145deg,#7c3aed,#5b21b6);
  border-bottom-right-radius:4px;
  box-shadow:0 4px 24px rgba(124,58,237,.3), 0 0 0 1px rgba(167,139,250,.15);
  color:rgba(255,255,255,.95);
}

.row.aria + .row.aria .bub { border-top-left-radius:7px; }
.row.you  + .row.you  .bub { border-top-right-radius:7px; }

/* markdown */
.bub p{margin:0 0 7px} .bub p:last-child{margin:0}
.bub strong{font-weight:600;color:#fff}
.bub em{color:#9f80c8;font-style:italic}
.bub ul,.bub ol{padding-left:18px;margin:5px 0}
.bub li{margin:2px 0}
.bub h1,.bub h2,.bub h3{font-weight:600;margin:10px 0 5px;color:#e9d5ff}
.bub h1{font-size:16px} .bub h2{font-size:14.5px} .bub h3{font-size:13.5px}
.bub code{font:12px/1 'SF Mono',monospace;background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.2);border-radius:5px;padding:1px 5px;color:#c4b5fd}
.bub pre{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px 14px;overflow-x:auto;margin:8px 0}
.bub pre code{background:none;border:none;padding:0;color:#ddd6fe}
.bub blockquote{border-left:2px solid #9f7aea;padding-left:10px;margin:6px 0;color:#9f80c8;font-style:italic}
.bub a{color:#c4b5fd;text-underline-offset:2px}
.bub hr{border:none;border-top:1px solid rgba(255,255,255,.07);margin:9px 0}

/* typing */
.typing-bub {
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:18px; border-bottom-left-radius:4px;
  padding:13px 16px; display:inline-flex; align-items:center; gap:5px;
  box-shadow:0 4px 24px rgba(0,0,0,.2);
}
.td { width:5px; height:5px; border-radius:50%; background:#9f7aea; opacity:.3; animation:td 1.3s ease-in-out infinite; }
.td:nth-child(2){animation-delay:.16s} .td:nth-child(3){animation-delay:.32s}
@keyframes td { 0%,60%,100%{opacity:.2;transform:scale(1)} 30%{opacity:1;transform:scale(1.4)} }

/* divider */
.dvd {
  display:flex; align-items:center; gap:10px;
  color:rgba(255,255,255,.12); font-size:10px; font-weight:500;
  letter-spacing:.6px; text-transform:uppercase; margin:10px 0 6px;
}
.dvd::before,.dvd::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}

/* ── Input ── */
.inp-zone {
  flex-shrink:0; padding:12px 20px;
  padding-bottom:max(16px,env(safe-area-inset-bottom));
  background:rgba(255,255,255,0.025);
  backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border-top:1px solid rgba(255,255,255,0.07);
}
.inp-frame {
  display:flex; align-items:flex-end; gap:10px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:18px; padding:10px 10px 10px 16px;
  transition:border-color .15s, box-shadow .15s;
}
.inp-frame:focus-within {
  border-color:rgba(167,139,250,.4);
  box-shadow:0 0 0 3px rgba(124,58,237,.12), 0 4px 24px rgba(0,0,0,.2);
}
textarea {
  flex:1; background:none; border:none; outline:none;
  color:#ede8ff; font:13.5px/1.55 'Inter',sans-serif;
  resize:none; min-height:22px; max-height:130px; overflow-y:auto;
  caret-color:#c4b5fd;
}
textarea::placeholder { color:rgba(255,255,255,.2); }
#sb {
  width:36px; height:36px; border-radius:50%; border:none;
  background:linear-gradient(145deg,#9f7aea,#7c3aed);
  color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all .15s;
  box-shadow:0 2px 14px rgba(124,58,237,.45);
}
#sb:hover { transform:scale(1.06); box-shadow:0 4px 20px rgba(124,58,237,.6); }
#sb:active { transform:scale(.93); }
#sb:disabled { background:rgba(255,255,255,.07); box-shadow:none; opacity:.3; cursor:default; }

@media(min-width:760px){
  #app{border-left:1px solid rgba(255,255,255,.05);border-right:1px solid rgba(255,255,255,.05)}
  #feed{padding:32px 28px 16px}
  .inp-zone{padding:14px 28px;padding-bottom:18px}
  header{padding:0 28px}
}
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div id="app">
  <header>
    <div class="brand">
      <div class="brand-glyph">
        <div class="brand-glyph-halo"></div>
        <div class="brand-glyph-core">A</div>
      </div>
      <div class="brand-text">
        <div class="brand-name">ARIA</div>
        <div class="brand-tag">AI Assistant</div>
      </div>
    </div>
    <div class="hdr-pills">
      <div class="pill">
        <div class="pill-dot" id="pip"></div>
        <span class="pill-label" id="ptxt">Online</span>
      </div>
      <button class="clear-pill" onclick="clearChat()">Clear</button>
    </div>
  </header>

  <div id="feed"><div class="dvd">Today</div></div>

  <div class="inp-zone">
    <div class="inp-frame">
      <textarea id="inp" rows="1" placeholder="Message ARIA…" autocomplete="off" spellcheck="true"></textarea>
      <button id="sb" disabled>
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 13V3M3 8l5-5 5 5"/></svg>
      </button>
    </div>
  </div>
</div>
<script>
(function(){
  const API='http://188.245.242.236:4000', UID='demo-user-1';
  const $f=document.getElementById('feed'), $i=document.getElementById('inp'),
        $b=document.getElementById('sb'), $p=document.getElementById('pip'),
        $t=document.getElementById('ptxt');
  marked.setOptions({breaks:true,gfm:true});
  let busy=false;

  $i.addEventListener('input',()=>{ $i.style.height='auto'; $i.style.height=Math.min($i.scrollHeight,130)+'px'; $b.disabled=!$i.value.trim()||busy; });
  $i.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!$b.disabled)go();} });
  $b.addEventListener('click',go);

  function addRow(role,txt){
    const row=document.createElement('div'); row.className='row '+role;
    const lbl=document.createElement('div'); lbl.className='row-label'; lbl.textContent=role==='aria'?'ARIA':'You';
    const bub=document.createElement('div'); bub.className='bub';
    if(role==='aria') bub.innerHTML=marked.parse(txt); else bub.textContent=txt;
    row.append(lbl,bub); $f.appendChild(row); tick();
  }
  function addTyping(){
    const row=document.createElement('div'); row.className='row aria'; row.id='ty';
    const lbl=document.createElement('div'); lbl.className='row-label'; lbl.textContent='ARIA';
    const w=document.createElement('div'); w.className='typing-bub';
    w.innerHTML='<div class="td"></div><div class="td"></div><div class="td"></div>';
    row.append(lbl,w); $f.appendChild(row); tick();
  }
  function removeTyping(){ document.getElementById('ty')?.remove(); }
  function tick(){ requestAnimationFrame(()=>{ $f.scrollTop=$f.scrollHeight; }); }
  function setStatus(on){
    $p.className='pill-dot'+(on?' pulsing':'');
    $t.textContent=on?'Thinking…':'Online';
  }
  async function go(){
    const txt=$i.value.trim(); if(!txt||busy)return;
    busy=true; $b.disabled=true; $i.value=''; $i.style.height='auto';
    addRow('you',txt); addTyping(); setStatus(true);
    try{
      const r=await fetch(`${API}/api/aria/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:UID,message:txt})});
      removeTyping();
      if(!r.ok)throw new Error('HTTP '+r.status);
      const{reply}=await r.json();
      addRow('aria',reply||"I've noted that down.");
    }catch(e){ removeTyping(); addRow('aria',`_Error: ${e.message}_`); }
    finally{ busy=false; setStatus(false); $i.focus(); }
  }
  window.clearChat=()=>{ $f.innerHTML='<div class="dvd">Today</div>'; addRow('aria','Fresh start. What are we working on?'); };
  addRow('aria',"Good to see you. What's on your agenda today?");
  setTimeout(()=>$i.focus(),300);
})();
</script>
</body>
</html>
